<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow — 在庫管理</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #d97706;
    --bg: #f5f3ef;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== Header ===== */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .logo { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: -0.5px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; color: var(--text-muted);
  }
  .user-role {
    font-size: 11px;
    background: var(--primary);
    color: #fff;
    padding: 2px 6px;
    border-radius: 20px;
  }
  .user-role.admin { background: #7c3aed; }

  /* ===== Layout ===== */
  main { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* ===== Stats ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-value.blue { color: var(--primary); }
  .stat-value.green { color: var(--success); }
  .stat-value.red { color: var(--danger); }
  .stat-value.orange { color: var(--warning); }

  /* ===== Section Card ===== */
  .section-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .section-title { font-size: 15px; font-weight: 700; }
  .section-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 4px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-warning { background: var(--warning); color: #fff; }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg); }
  .btn-move {
    background: #eff6ff; color: var(--primary);
    border: 1px solid #bfdbfe;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 6px;
  }
  .btn-move:hover { background: #dbeafe; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-block { width: 100%; }
  .btn-quick {
    flex: 1;
    background: #f3f4f6; color: var(--text);
    border: 1px solid var(--border);
    font-size: 15px;
    padding: 10px 0;
    border-radius: 8px;
  }
  .btn-quick:hover { background: #e5e7eb; }

  /* ===== Table ===== */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 10px 12px;
    background: #f9fafb;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  td {
    padding: 12px 12px;
    border-bottom: 1px solid #f3f4f6;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }

  .item-name { font-weight: 600; font-size: 14px; }
  .item-maker { font-size: 11px; color: var(--text-muted); }
  .item-code { font-size: 11px; color: var(--text-muted); font-family: monospace; }

  .stock-cell { font-weight: 700; font-size: 15px; }
  .stock-low { color: var(--danger); }
  .stock-ok { color: var(--success); }

  .process-badge {
    display: inline-block;
    background: #eff6ff;
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .moves-cell { display: flex; flex-wrap: wrap; gap: 4px; }

  /* ===== Empty State ===== */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
  .empty-text { font-size: 14px; }
  .empty-sub { font-size: 12px; margin-top: 4px; }

  /* ===== History ===== */
  .history-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .h-stat {
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    background: var(--bg);
  }
  .h-stat-label { font-size: 11px; color: var(--text-muted); }
  .h-stat-value { font-size: 20px; font-weight: 700; margin-top: 2px; }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-in { background: #dcfce7; color: #15803d; }
  .badge-out { background: #fee2e2; color: #b91c1c; }
  .badge-move { background: #eff6ff; color: #1d4ed8; }
  .badge-adjust { background: #fef3c7; color: #92400e; }

  /* ===== Modal ===== */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal {
    background: var(--card);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom);
    transform: translateY(30px);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .overlay.open .modal {
    transform: translateY(0);
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: #d1d5db;
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-size: 17px; font-weight: 700; }
  .modal-close {
    background: #f3f4f6; border: none; cursor: pointer;
    width: 30px; height: 30px; border-radius: 50%;
    font-size: 16px; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .modal-body { padding: 16px 20px; }
  .modal-footer { padding: 12px 20px 16px; }

  /* ===== Form ===== */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .form-control {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    background: var(--card);
    color: var(--text);
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }
  .form-control.error { border-color: var(--danger); }
  select.form-control { cursor: pointer; }

  .qty-input-wrap { position: relative; }
  .qty-input {
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    padding: 16px;
    letter-spacing: 2px;
  }
  .quick-btns { display: flex; gap: 8px; margin-top: 8px; }

  .stock-preview {
    background: #f0fdf4;
    border: 1px solid #86efac;
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 12px;
  }
  .stock-preview.warning {
    background: #fff7ed;
    border-color: #fdba74;
  }
  .stock-preview.danger {
    background: #fef2f2;
    border-color: #fca5a5;
  }
  .stock-preview-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }
  .stock-preview-row + .stock-preview-row { margin-top: 6px; }
  .stock-num { font-weight: 700; font-size: 18px; }

  .error-msg {
    color: var(--danger);
    font-size: 12px;
    margin-top: 6px;
    display: none;
  }
  .error-msg.show { display: block; }

  .info-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    background: #f9fafb;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .info-row .arrow { color: var(--text-muted); font-size: 16px; }
  .info-item { font-weight: 600; }

  /* ===== Alert ===== */
  .alert-banner {
    background: #fef3c7;
    border-left: 4px solid var(--warning);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .alert-banner.hidden { display: none; }

  /* ===== Search ===== */
  .search-bar {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: var(--bg);
  }
  .search-input:focus { outline: none; border-color: var(--primary); }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-grid .stat-card:last-child { grid-column: span 2; }
    th, td { padding: 8px; }
    .overlay { align-items: flex-end; }
    .modal { border-radius: 20px 20px 0 0; }
    .section-header { flex-direction: column; align-items: flex-start; }
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">StockFlow</div>
  <div class="header-right">
    <div class="user-badge">
      <span id="userNameDisplay">田中 太郎</span>
      <span id="userRoleBadge" class="user-role">一般</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="toggleAdmin()">⚙️</button>
  </div>
</header>

<main>

  <!-- Alert Banner -->
  <div id="alertBanner" class="alert-banner hidden">
    ⚠️ <span id="alertText"></span>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">アイテム数</div>
      <div class="stat-value blue" id="statItems">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">在庫不足</div>
      <div class="stat-value red" id="statLow">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">要補充</div>
      <div class="stat-value orange" id="statReplenish">0</div>
    </div>
  </div>

  <!-- Inventory Section -->
  <div class="section-card">
    <div class="section-header">
      <div class="section-title">📦 在庫一覧</div>
      <div class="section-actions">
        <button class="btn btn-success btn-sm" onclick="openModal('inModal')">↑ 入庫</button>
        <button class="btn btn-danger btn-sm" onclick="openModal('outModal')">↓ 出庫</button>
        <button id="btnAdjust" class="btn btn-warning btn-sm hidden" onclick="openModal('adjustModal')">⚖️ 在庫調整</button>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 CSV</button>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" class="search-input" placeholder="🔍 品名・品番で検索…" id="searchInput" oninput="renderInventory()">
    </div>
    <div class="table-wrap">
      <table id="inventoryTable">
        <thead>
          <tr>
            <th>品名 / 品番</th>
            <th>メーカー</th>
            <th>工程</th>
            <th>在庫数</th>
            <th>保管場所</th>
            <th>工程移動</th>
          </tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
      </table>
    </div>
  </div>

  <!-- History Section -->
  <div class="section-card">
    <div class="section-header">
      <div class="section-title">📋 入出庫 / 移動 履歴</div>
      <button class="btn btn-ghost btn-sm" onclick="clearHistory()">🗑 履歴クリア</button>
    </div>
    <div class="history-stats">
      <div class="h-stat">
        <div class="h-stat-label">今月の入庫</div>
        <div class="h-stat-value" style="color:var(--success)" id="hIn">0</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-label">今月の出庫</div>
        <div class="h-stat-value" style="color:var(--danger)" id="hOut">0</div>
      </div>
      <div class="h-stat">
        <div class="h-stat-label">記録件数</div>
        <div class="h-stat-value" style="color:var(--primary)" id="hTotal">0</div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日時</th>
            <th>種別</th>
            <th>品名</th>
            <th>数量</th>
            <th>担当者</th>
            <th>メモ</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>

</main>

<!-- ============================================================ -->
<!--  MODAL: 工程移動                                              -->
<!-- ============================================================ -->
<div id="moveModal" class="overlay" onclick="overlayClose(event,'moveModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">🔄 工程移動</div>
      <button class="modal-close" onclick="closeModal('moveModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="info-row">
        <span class="info-item" id="moveSrcLabel">—</span>
        <span class="arrow">→</span>
        <span class="info-item" id="moveDstLabel">—</span>
      </div>
      <div class="form-group">
        <label class="form-label">数量</label>
        <input type="number" class="form-control qty-input" id="moveQty"
               min="1" inputmode="numeric" placeholder="0"
               oninput="updateMovePreview()">
        <div class="quick-btns">
          <button class="btn-quick" onclick="setQty('moveQty',10)">10</button>
          <button class="btn-quick" onclick="setQty('moveQty',50)">50</button>
          <button class="btn-quick" onclick="setQty('moveQty',100)">100</button>
        </div>
        <div id="moveQtyError" class="error-msg"></div>
      </div>
      <div id="movePreview" class="stock-preview">
        <div class="stock-preview-row">
          <span id="moveSrcName">移動元</span>
          <span class="stock-num" id="moveSrcAfter">—</span>
        </div>
        <div class="stock-preview-row">
          <span id="moveDstName">移動先</span>
          <span class="stock-num" id="moveDstAfter">—</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary btn-block" onclick="execMove()" style="padding:14px;font-size:16px;">登録</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!--  MODAL: 入庫                                                  -->
<!-- ============================================================ -->
<div id="inModal" class="overlay" onclick="overlayClose(event,'inModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">↑ 入庫登録</div>
      <button class="modal-close" onclick="closeModal('inModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">品名</label>
        <select class="form-control" id="inItem" onchange="updateInPreview()">
          <option value="">— 選択 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">入庫先（工程）</label>
        <select class="form-control" id="inProcess" onchange="updateInPreview()">
          <option value="">— 選択 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">数量</label>
        <input type="number" class="form-control qty-input" id="inQty"
               min="1" inputmode="numeric" placeholder="0"
               oninput="updateInPreview()">
        <div class="quick-btns">
          <button class="btn-quick" onclick="setQty('inQty',10)">10</button>
          <button class="btn-quick" onclick="setQty('inQty',50)">50</button>
          <button class="btn-quick" onclick="setQty('inQty',100)">100</button>
        </div>
        <div id="inQtyError" class="error-msg"></div>
      </div>
      <div class="form-group">
        <label class="form-label">理由</label>
        <select class="form-control" id="inReason">
          <option value="材料入荷">材料入荷</option>
          <option value="外注戻り">外注戻り</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">担当者</label>
        <input type="text" class="form-control" id="inPerson" placeholder="氏名を入力">
      </div>
      <div id="inPreview" class="stock-preview" style="display:none">
        <div class="stock-preview-row">
          <span>入庫後の在庫</span>
          <span class="stock-num" id="inAfter">—</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-success btn-block" onclick="execIn()" style="padding:14px;font-size:16px;">入庫登録</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!--  MODAL: 出庫                                                  -->
<!-- ============================================================ -->
<div id="outModal" class="overlay" onclick="overlayClose(event,'outModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">↓ 出庫登録</div>
      <button class="modal-close" onclick="closeModal('outModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">品名</label>
        <select class="form-control" id="outItem" onchange="updateOutPreview()">
          <option value="">— 選択 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">出庫元（工程）</label>
        <select class="form-control" id="outProcess" onchange="updateOutPreview()">
          <option value="">— 選択 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">数量</label>
        <input type="number" class="form-control qty-input" id="outQty"
               min="1" inputmode="numeric" placeholder="0"
               oninput="updateOutPreview()">
        <div class="quick-btns">
          <button class="btn-quick" onclick="setQty('outQty',10)">10</button>
          <button class="btn-quick" onclick="setQty('outQty',50)">50</button>
          <button class="btn-quick" onclick="setQty('outQty',100)">100</button>
        </div>
        <div id="outQtyError" class="error-msg"></div>
      </div>
      <div class="form-group">
        <label class="form-label">理由</label>
        <select class="form-control" id="outReason">
          <option value="不良">不良</option>
          <option value="廃棄">廃棄</option>
          <option value="出荷">出荷</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">担当者</label>
        <input type="text" class="form-control" id="outPerson" placeholder="氏名を入力">
      </div>
      <div id="outPreview" class="stock-preview" style="display:none">
        <div class="stock-preview-row">
          <span>出庫後の在庫</span>
          <span class="stock-num" id="outAfter">—</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-block" onclick="execOut()" style="padding:14px;font-size:16px;">出庫登録</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!--  MODAL: 在庫調整（管理者専用）                                 -->
<!-- ============================================================ -->
<div id="adjustModal" class="overlay" onclick="overlayClose(event,'adjustModal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">⚖️ 在庫調整（管理者）</div>
      <button class="modal-close" onclick="closeModal('adjustModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">品名</label>
        <select class="form-control" id="adjItem" onchange="updateAdjPreview()">
          <option value="">— 選択 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">工程</label>
        <select class="form-control" id="adjProcess" onchange="updateAdjPreview()">
          <option value="">— 選択 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">実在庫数（実数を入力）</label>
        <input type="number" class="form-control qty-input" id="adjQty"
               min="0" inputmode="numeric" placeholder="0"
               oninput="updateAdjPreview()">
        <div id="adjQtyError" class="error-msg"></div>
      </div>
      <div id="adjPreview" class="stock-preview" style="display:none">
        <div class="stock-preview-row">
          <span>現在の在庫</span>
          <span class="stock-num" id="adjCurrent">—</span>
        </div>
        <div class="stock-preview-row">
          <span>調整後</span>
          <span class="stock-num" id="adjAfter">—</span>
        </div>
        <div class="stock-preview-row" style="margin-top:8px;padding-top:8px;border-top:1px solid #e5e7eb">
          <span>差分</span>
          <span class="stock-num" id="adjDiff">—</span>
        </div>
      </div>
      <div class="form-group" style="margin-top:12px">
        <label class="form-label">理由</label>
        <input type="text" class="form-control" id="adjReason" placeholder="棚卸し・数え直し 等">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-warning btn-block" onclick="execAdjust()" style="padding:14px;font-size:16px;">調整登録</button>
    </div>
  </div>
</div>


<script>
// ============================================================
// DATA
// ============================================================

const PROCESSES = ['仕掛品', 'バリ取り前', '完成品'];
const PROCESS_NEXT = { '仕掛品': 'バリ取り前', 'バリ取り前': '完成品' };
const LOW_THRESHOLD = 10;

const DEMO_ITEMS = [
  { id: 1, name: 'シャフトA', maker: '鈴木製作所', code: 'SFT-001', location: 'A棚', minStock: 10,
    stock: { '仕掛品': 120, 'バリ取り前': 30, '完成品': 15 } },
  { id: 2, name: 'ブラケットB', maker: '山田工業', code: 'BKT-002', location: 'B棚', minStock: 5,
    stock: { '仕掛品': 8, 'バリ取り前': 5, '完成品': 2 } },
  { id: 3, name: 'ピンC', maker: '佐藤精機', code: 'PIN-003', location: 'C棚', minStock: 20,
    stock: { '仕掛品': 200, 'バリ取り前': 0, '完成品': 0 } },
];

// State
let items = [];
let history = [];
let isAdmin = false;
let currentUser = '田中 太郎';

// Move context
let moveCtx = null; // { itemId, srcProcess, dstProcess }

// ============================================================
// localStorage
// ============================================================
function save() {
  localStorage.setItem('sf_items', JSON.stringify(items));
  localStorage.setItem('sf_history', JSON.stringify(history));
}
function load() {
  const si = localStorage.getItem('sf_items');
  const sh = localStorage.getItem('sf_history');
  items = si ? JSON.parse(si) : JSON.parse(JSON.stringify(DEMO_ITEMS));
  history = sh ? JSON.parse(sh) : [];
}

// ============================================================
// Utils
// ============================================================
function now() {
  return new Date().toLocaleString('ja-JP', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
}
function itemById(id) { return items.find(i => i.id === id); }
function getStock(item, process) { return item.stock[process] ?? 0; }
function totalStock(item) { return Object.values(item.stock).reduce((a,b)=>a+b,0); }

function addHistory(entry) {
  history.unshift({ ...entry, time: now() });
  save();
  renderHistory();
}

// ============================================================
// Admin Toggle
// ============================================================
function toggleAdmin() {
  isAdmin = !isAdmin;
  document.getElementById('userRoleBadge').textContent = isAdmin ? '管理者' : '一般';
  document.getElementById('userRoleBadge').className = 'user-role' + (isAdmin ? ' admin' : '');
  document.getElementById('btnAdjust').classList.toggle('hidden', !isAdmin);
}

// ============================================================
// Render: Inventory
// ============================================================
function renderInventory() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const tbody = document.getElementById('inventoryBody');
  const filtered = items.filter(it =>
    it.name.toLowerCase().includes(q) || it.code.toLowerCase().includes(q)
  );

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">アイテムが見つかりません</div>
      </div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(it => {
    const total = totalStock(it);
    const isLow = total <= it.minStock;

    const processRows = PROCESSES.map(p => {
      const st = getStock(it, p);
      const next = PROCESS_NEXT[p];
      const moveBtn = next
        ? `<button class="btn-move" onclick="openMoveModal(${it.id},'${p}','${next}')">→ ${next}</button>`
        : '';
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span class="process-badge">${p}</span>
        <span style="font-weight:600;min-width:32px">${st}</span>
        ${moveBtn}
      </div>`;
    }).join('');

    return `<tr>
      <td>
        <div class="item-name">${it.name}</div>
        <div class="item-code">${it.code}</div>
      </td>
      <td><span class="item-maker">${it.maker}</span></td>
      <td>${processRows}</td>
      <td class="stock-cell ${isLow ? 'stock-low' : 'stock-ok'}">
        ${total}${isLow ? ' ⚠️' : ''}
      </td>
      <td>${it.location}</td>
      <td>
        <button class="btn btn-success btn-sm" style="margin-bottom:4px;width:100%" onclick="openInModalFor(${it.id})">↑ 入庫</button>
        <button class="btn btn-danger btn-sm" style="width:100%" onclick="openOutModalFor(${it.id})">↓ 出庫</button>
      </td>
    </tr>`;
  }).join('');

  updateStats();
  checkAlerts();
}

// ============================================================
// Render: History
// ============================================================
function renderHistory() {
  const tbody = document.getElementById('historyBody');
  const thisMonth = new Date().toLocaleString('ja-JP', { year:'numeric', month:'2-digit' });

  let inCount = 0, outCount = 0;
  history.forEach(h => {
    if (h.time.startsWith(thisMonth)) {
      if (h.type === '入庫') inCount++;
      if (h.type === '出庫') outCount++;
    }
  });

  document.getElementById('hIn').textContent = inCount;
  document.getElementById('hOut').textContent = outCount;
  document.getElementById('hTotal').textContent = history.length;

  if (history.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6">
      <div class="empty">
        <div class="empty-icon">📋</div>
        <div class="empty-text">入出庫履歴がありません</div>
        <div class="empty-sub">「入庫登録」または「出庫登録」から記録してください</div>
      </div>
    </td></tr>`;
    return;
  }

  const typeBadge = { '入庫':'badge-in', '出庫':'badge-out', '工程移動':'badge-move', '在庫調整':'badge-adjust' };
  tbody.innerHTML = history.slice(0,50).map(h => `<tr>
    <td style="white-space:nowrap;font-size:12px">${h.time}</td>
    <td><span class="badge ${typeBadge[h.type]||'badge-move'}">${h.type}</span></td>
    <td>${h.name}</td>
    <td style="font-weight:700">${h.qty > 0 ? '+' : ''}${h.qty}</td>
    <td>${h.person || '—'}</td>
    <td style="font-size:12px;color:var(--text-muted)">${h.memo || ''}</td>
  </tr>`).join('');
}

// ============================================================
// Stats & Alerts
// ============================================================
function updateStats() {
  document.getElementById('statItems').textContent = items.length;
  const low = items.filter(it => totalStock(it) <= it.minStock).length;
  const rep = items.filter(it => totalStock(it) === 0).length;
  document.getElementById('statLow').textContent = low;
  document.getElementById('statReplenish').textContent = rep;
}

function checkAlerts() {
  const lowItems = items.filter(it => totalStock(it) <= it.minStock);
  const banner = document.getElementById('alertBanner');
  if (lowItems.length > 0) {
    document.getElementById('alertText').textContent =
      `在庫不足アイテム: ${lowItems.map(i=>i.name).join('、')}`;
    banner.classList.remove('hidden');
  } else {
    banner.classList.add('hidden');
  }
}

// ============================================================
// Modal helpers
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
  // populate selects
  if (id === 'inModal') populateSelects('inItem', 'inProcess');
  if (id === 'outModal') populateSelects('outItem', 'outProcess');
  if (id === 'adjustModal') populateSelects('adjItem', 'adjProcess');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function overlayClose(e, id) {
  if (e.target.id === id) closeModal(id);
}

function populateSelects(itemSelId, procSelId) {
  const iSel = document.getElementById(itemSelId);
  const pSel = document.getElementById(procSelId);
  iSel.innerHTML = '<option value="">— 選択 —</option>' +
    items.map(it => `<option value="${it.id}">${it.name}</option>`).join('');
  pSel.innerHTML = '<option value="">— 選択 —</option>' +
    PROCESSES.map(p => `<option value="${p}">${p}</option>`).join('');
}

function setQty(inputId, val) {
  document.getElementById(inputId).value = val;
  const evMap = { moveQty: updateMovePreview, inQty: updateInPreview, outQty: updateOutPreview, adjQty: updateAdjPreview };
  if (evMap[inputId]) evMap[inputId]();
}

// ============================================================
// MOVE Modal
// ============================================================
function openMoveModal(itemId, src, dst) {
  moveCtx = { itemId, srcProcess: src, dstProcess: dst };
  const item = itemById(itemId);
  document.getElementById('moveSrcLabel').textContent = src;
  document.getElementById('moveDstLabel').textContent = dst;
  document.getElementById('moveSrcName').textContent = `${item.name}（${src}）`;
  document.getElementById('moveDstName').textContent = `${item.name}（${dst}）`;
  document.getElementById('moveQty').value = '';
  document.getElementById('moveQtyError').classList.remove('show');
  updateMovePreview();
  openModal('moveModal');
}

function updateMovePreview() {
  if (!moveCtx) return;
  const item = itemById(moveCtx.itemId);
  const srcStock = getStock(item, moveCtx.srcProcess);
  const dstStock = getStock(item, moveCtx.dstProcess);
  const qty = parseInt(document.getElementById('moveQty').value) || 0;
  const preview = document.getElementById('movePreview');

  document.getElementById('moveSrcAfter').textContent =
    qty > 0 ? `${srcStock} → ${srcStock - qty}` : `${srcStock}`;
  document.getElementById('moveDstAfter').textContent =
    qty > 0 ? `${dstStock} → ${dstStock + qty}` : `${dstStock}`;

  preview.className = 'stock-preview';
  if (qty > srcStock) preview.className += ' danger';
  else if (srcStock - qty <= LOW_THRESHOLD) preview.className += ' warning';
}

function execMove() {
  const qty = parseInt(document.getElementById('moveQty').value);
  const errEl = document.getElementById('moveQtyError');
  const item = itemById(moveCtx.itemId);
  const srcStock = getStock(item, moveCtx.srcProcess);

  errEl.classList.remove('show');
  if (!qty || qty < 1) { errEl.textContent = '数量を1以上入力してください'; errEl.classList.add('show'); return; }
  if (qty > srcStock) { errEl.textContent = `在庫不足です（現在: ${srcStock}）`; errEl.classList.add('show'); return; }

  item.stock[moveCtx.srcProcess] = srcStock - qty;
  item.stock[moveCtx.dstProcess] = getStock(item, moveCtx.dstProcess) + qty;

  addHistory({
    type: '工程移動',
    name: item.name,
    qty,
    person: currentUser,
    memo: `${moveCtx.srcProcess} → ${moveCtx.dstProcess}`
  });

  closeModal('moveModal');
  renderInventory();
  renderHistory();
}

// ============================================================
// IN Modal
// ============================================================
function openInModalFor(itemId) {
  openModal('inModal');
  document.getElementById('inItem').value = itemId;
  updateInPreview();
}

function updateInPreview() {
  const itemId = parseInt(document.getElementById('inItem').value);
  const proc = document.getElementById('inProcess').value;
  const qty = parseInt(document.getElementById('inQty').value) || 0;
  const preview = document.getElementById('inPreview');
  if (!itemId || !proc || qty < 1) { preview.style.display = 'none'; return; }
  const item = itemById(itemId);
  const current = getStock(item, proc);
  document.getElementById('inAfter').textContent = `${current} → ${current + qty}`;
  preview.style.display = 'block';
  preview.className = 'stock-preview';
}

function execIn() {
  const itemId = parseInt(document.getElementById('inItem').value);
  const proc = document.getElementById('inProcess').value;
  const qty = parseInt(document.getElementById('inQty').value);
  const reason = document.getElementById('inReason').value;
  const person = document.getElementById('inPerson').value || currentUser;
  const errEl = document.getElementById('inQtyError');

  errEl.classList.remove('show');
  if (!itemId) { alert('品名を選択してください'); return; }
  if (!proc) { alert('工程を選択してください'); return; }
  if (!qty || qty < 1) { errEl.textContent = '数量を1以上入力してください'; errEl.classList.add('show'); return; }

  const item = itemById(itemId);
  item.stock[proc] = getStock(item, proc) + qty;

  addHistory({ type:'入庫', name:item.name, qty, person, memo:`${proc} / ${reason}` });
  closeModal('inModal');
  renderInventory();
}

// ============================================================
// OUT Modal
// ============================================================
function openOutModalFor(itemId) {
  openModal('outModal');
  document.getElementById('outItem').value = itemId;
  updateOutPreview();
}

function updateOutPreview() {
  const itemId = parseInt(document.getElementById('outItem').value);
  const proc = document.getElementById('outProcess').value;
  const qty = parseInt(document.getElementById('outQty').value) || 0;
  const preview = document.getElementById('outPreview');
  if (!itemId || !proc || qty < 1) { preview.style.display = 'none'; return; }
  const item = itemById(itemId);
  const current = getStock(item, proc);
  document.getElementById('outAfter').textContent = `${current} → ${Math.max(0, current - qty)}`;
  preview.style.display = 'block';
  preview.className = 'stock-preview' + (qty > current ? ' danger' : '');
}

function execOut() {
  const itemId = parseInt(document.getElementById('outItem').value);
  const proc = document.getElementById('outProcess').value;
  const qty = parseInt(document.getElementById('outQty').value);
  const reason = document.getElementById('outReason').value;
  const person = document.getElementById('outPerson').value || currentUser;
  const errEl = document.getElementById('outQtyError');

  errEl.classList.remove('show');
  if (!itemId) { alert('品名を選択してください'); return; }
  if (!proc) { alert('工程を選択してください'); return; }
  if (!qty || qty < 1) { errEl.textContent = '数量を1以上入力してください'; errEl.classList.add('show'); return; }

  const item = itemById(itemId);
  const current = getStock(item, proc);
  if (qty > current) { errEl.textContent = `在庫不足です（現在: ${current}）`; errEl.classList.add('show'); return; }

  item.stock[proc] = current - qty;
  addHistory({ type:'出庫', name:item.name, qty: -qty, person, memo:`${proc} / ${reason}` });
  closeModal('outModal');
  renderInventory();
}

// ============================================================
// ADJUST Modal
// ============================================================
function updateAdjPreview() {
  const itemId = parseInt(document.getElementById('adjItem').value);
  const proc = document.getElementById('adjProcess').value;
  const newQty = parseInt(document.getElementById('adjQty').value);
  const preview = document.getElementById('adjPreview');
  if (!itemId || !proc || isNaN(newQty)) { preview.style.display = 'none'; return; }
  const item = itemById(itemId);
  const current = getStock(item, proc);
  const diff = newQty - current;
  document.getElementById('adjCurrent').textContent = current;
  document.getElementById('adjAfter').textContent = newQty;
  document.getElementById('adjDiff').textContent = (diff >= 0 ? '+' : '') + diff;
  preview.style.display = 'block';
  preview.className = 'stock-preview' + (diff < 0 ? ' warning' : '');
}

function execAdjust() {
  if (!isAdmin) { alert('管理者権限が必要です'); return; }
  const itemId = parseInt(document.getElementById('adjItem').value);
  const proc = document.getElementById('adjProcess').value;
  const newQty = parseInt(document.getElementById('adjQty').value);
  const reason = document.getElementById('adjReason').value || '在庫調整';
  const errEl = document.getElementById('adjQtyError');

  errEl.classList.remove('show');
  if (!itemId) { alert('品名を選択してください'); return; }
  if (!proc) { alert('工程を選択してください'); return; }
  if (isNaN(newQty) || newQty < 0) { errEl.textContent = '0以上の数値を入力してください'; errEl.classList.add('show'); return; }

  const item = itemById(itemId);
  const diff = newQty - getStock(item, proc);
  item.stock[proc] = newQty;

  addHistory({ type:'在庫調整', name:item.name, qty:diff, person:currentUser, memo:`${proc} / ${reason}` });
  closeModal('adjustModal');
  renderInventory();
}

// ============================================================
// History clear
// ============================================================
function clearHistory() {
  if (!confirm('履歴をすべて削除しますか？')) return;
  history = [];
  save();
  renderHistory();
}

// ============================================================
// CSV Export
// ============================================================
function exportCSV() {
  const rows = [['日時','種別','品名','数量','担当者','メモ']];
  history.forEach(h => rows.push([h.time, h.type, h.name, h.qty, h.person||'', h.memo||'']));
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `stockflow_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ============================================================
// Init
// ============================================================
load();
renderInventory();
renderHistory();
</script>
</body>
</html>
