<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>現場向け・在庫管理アプリ</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* 一覧コンテナ */
.list-container {
  padding: 10px;
}

/* 1行＝1アイテム */
.item-row {
  display: flex;
  align-items: center;
  background: #fff;
  padding: 8px 10px;
  margin-bottom: 6px;
  border-radius: 6px;
  box-shadow: 0 0 2px rgba(0,0,0,0.1);
  justify-content: space-between;
}

/* 左側（品名＋品番） */
.item-info {
  flex: 1;
  min-width: 0;
}

/* 品名 */
.item-name {
  font-size: 16px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 品番は小さく */
.item-part {
  font-size: 12px;
  color: #666;
}

/* 在庫表示（仕 / バ / 完） */
.item-stock {
  font-size: 16px;
  font-weight: bold;
  margin: 0 8px;
  white-space: nowrap;
}

/* 色（通常 / 注意 / 危険） */
.normal { color: #444; }
.warn { color: #ff8c00; }
.danger { color: #d60000; }

/* 詳細ボタン */
.detail-btn {
  font-size: 20px;
  padding: 4px 8px;
  background: #ddd;
  border-radius: 4px;
  margin-left: 6px;
}

/* モーダル背景 */
.modal-bg {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.3);
  justify-content: center;
  align-items: center;
}

/* モーダル本体 */
.modal {
  background: #fff;
  width: 92%;
  max-width: 500px;
  padding: 12px;
  border-radius: 8px;
}

/* 見出し */
.modal-title {
  font-size: 20px;
  font-weight: bold;
}

/* ラベル */
.label {
  font-size: 12px;
  color: #666;
}

/* 工程ライン */
.process-row {
  display: flex;
  align-items: center;
  margin: 10px 0;
}

/* 工程名 */
.process-name {
  width: 80px;
  font-weight: bold;
}

/* 工程数値 */
.process-value {
  font-size: 18px;
  font-weight: bold;
  margin: 0 10px;
}

/* 工程の矢印ボタン */
.move-btn {
  font-size: 14px;
  background: #ddd;
  padding: 6px 10px;
  border-radius: 4px;
}

/* 数量入力 */
.qty-input {
  width: 80px;
  font-size: 20px;
  padding: 4px;
  margin-top: 10px;
}

/* 確認ダイアログ用 */
.confirm-box {
  display: none;
  margin-top: 8px;
  padding: 8px;
  background: #ffe0b2;
  border-radius: 4px;
}

/* 管理者専用エリア */
.admin-only {
  display: none;
  padding: 10px;
  background: #fff6e5;
  margin: 10px;
  border-radius: 6px;
}

/* 権限切り替え */
.role-switch {
  position: fixed;
  top: 5px;
  right: 5px;
  font-size: 12px;
  background: #ccc;
  padding: 4px 6px;
  border-radius: 4px;
}

/* スマホでも1行に収めるための調整 */
@media (max-width: 480px) {
  .item-name { font-size: 14px; }
  .item-stock { font-size: 14px; }
  .detail-btn { font-size: 18px; }
}
</style>
</head>

<body>

<div class="role-switch">
  権限：<select id="roleSelect">
    <option value="user">一般</option>
    <option value="admin">管理者</option>
  </select>
</div>

<div class="list-container" id="itemList"></div>

<!-- モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalName"></div>

    <div class="label">メーカー</div>
    <div id="modalMaker"></div>

    <div class="label">品番</div>
    <div id="modalPart"></div>

    <div class="label">保管場所</div>
    <div id="modalLoc"></div>

    <div class="label">メモ</div>
    <div id="modalMemo"></div>

    <hr>

    <div class="label">数量入力（テンキー用）</div>
    <input type="number" id="qtyInput" class="qty-input" inputmode="numeric">

    <div id="processArea"></div>

    <div class="confirm-box" id="confirmBox">
      この操作を実行しますか？
      <button id="confirmYes">はい</button>
      <button id="confirmNo">いいえ</button>
    </div>

    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<!-- 管理者設定 -->
<div class="admin-only" id="adminPanel">
  <h3>管理者メニュー</h3>
  ・CSV出力  
  ・在庫初期化  
  ・最低在庫設定  
  ・工程名変更  
  （実装枠：必要に応じて追加処理可能）
</div>

<script>
// ===== データ（ローカルストレージ） =====

function loadData() {
  const saved = localStorage.getItem("items");
  if (saved) return JSON.parse(saved);
  return [
    {
      id: 1,
      name: "六角ボルト",
      partNumber: "AB-1234",
      maker: "A社",
      location: "棚A-1",
      memo: "",
      process_stock: { workInProgress: 100, preDeburr: 30, finished: 20 },
      minStock: 30
    }
  ];
}

let items = loadData();
let currentItem = null;
let pendingMove = null;

// ===== 一覧描画 =====

function renderList() {
  const list = document.getElementById("itemList");
  list.innerHTML = "";

  items.forEach(item => {
    const dangerous = item.process_stock.finished < item.minStock;

    const row = document.createElement("div");
    row.className = "item-row";

    row.innerHTML = `
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-part">${item.partNumber || ""}</div>
      </div>

      <div class="item-stock ${dangerous ? "danger" : "normal"}">
        仕${item.process_stock.workInProgress} / バ${item.process_stock.preDeburr} / 完${item.process_stock.finished}
      </div>

      <div class="detail-btn" onclick="openModal(${item.id})">→</div>
    `;

    list.appendChild(row);
  });
}

// ===== モーダル操作 =====

function openModal(id) {
  currentItem = items.find(x => x.id === id);

  document.getElementById("modalName").textContent = currentItem.name;
  document.getElementById("modalMaker").textContent = currentItem.maker;
  document.getElementById("modalPart").textContent = currentItem.partNumber;
  document.getElementById("modalLoc").textContent = currentItem.location;
  document.getElementById("modalMemo").textContent = currentItem.memo;

  renderProcessLines();
  document.getElementById("modalBg").style.display = "flex";
}

function closeModal() {
  document.getElementById("modalBg").style.display = "none";
  document.getElementById("confirmBox").style.display = "none";
}

// ===== 工程ライン描画 =====

function renderProcessLines() {
  const p = currentItem.process_stock;
  const area = document.getElementById("processArea");

  area.innerHTML = `
    <div class="process-row">
      <div class="process-name">仕掛品</div>
      <div class="process-value">${p.workInProgress}</div>
      <button class="move-btn" onclick="askMove('workInProgress','preDeburr')">→ バリ前</button>
    </div>

    <div class="process-row">
      <div class="process-name">バリ前</div>
      <div class="process-value">${p.preDeburr}</div>
      <button class="move-btn" onclick="askMove('preDeburr','finished')">→ 完成品</button>
    </div>

    <div class="process-row">
      <div class="process-name">完成品</div>
      <div class="process-value">${p.finished}</div>
    </div>
  `;
}

// ===== 移動処理 =====

function askMove(from, to) {
  const qty = Number(document.getElementById("qtyInput").value);
  if (!qty || qty <= 0) return alert("数量を入力してください。");

  pendingMove = { from, to, qty };
  document.getElementById("confirmBox").style.display = "block";
}

document.getElementById("confirmYes").onclick = function() {
  if (!pendingMove) return;
  const { from, to, qty } = pendingMove;

  const stock = currentItem.process_stock;
  if (stock[from] < qty) {
    alert("在庫が不足しています。");
    return;
  }

  stock[from] -= qty;
  stock[to] += qty;

  saveData();
  renderList();
  renderProcessLines();

  document.getElementById("confirmBox").style.display = "none";
  pendingMove = null;
};

document.getElementById("confirmNo").onclick = function() {
  document.getElementById("confirmBox").style.display = "none";
  pendingMove = null;
};

// ===== 保存 =====

function saveData() {
  localStorage.setItem("items", JSON.stringify(items));
}

// ===== 権限管理 =====

document.getElementById("roleSelect").onchange = function() {
  const role = this.value;
  document.getElementById("adminPanel").style.display = role === "admin" ? "block" : "none";
};

// 初期描画
renderList();
</script>

</body>
</html>
