<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>在庫管理システム v10</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff;--sf:#ffffff;--s2:#f8f9fa;--s3:#f0f2f5;
  --bd:#e5e7eb;--bd2:#d1d5db;
  --tx:#111827;--mu:#6b7280;--di:#9ca3af;
  --ac:#2563eb;--acd:rgba(37,99,235,.1);
  --gr:#10b981;--grd:rgba(16,185,129,.1);--grb:rgba(16,185,129,.2);
  --am:#f59e0b;--amd:rgba(245,158,11,.1);--amb:rgba(245,158,11,.2);
  --re:#ef4444;--red:rgba(239,68,68,.1);--reb:rgba(239,68,68,.2);
  --pu:#8b5cf6;--pud:rgba(139,92,246,.1);--pub:rgba(139,92,246,.2);
  --in:#6366f1;--ind:rgba(99,102,241,.1);
  --fn:'JetBrains Mono',monospace;--fj:'Noto Sans JP',sans-serif;
  --r:8px;--r2:12px;--r3:20px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --nav:56px;--hdr:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--fj);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r);border:none;cursor:pointer;font-family:var(--fj);font-size:14px;font-weight:700;transition:all .15s;white-space:nowrap;user-select:none;min-height:44px;letter-spacing:.02em}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--ac);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:var(--re);color:#fff}
.btn-ghost{background:transparent;color:var(--mu);border:1.5px solid var(--bd2)}
.btn-ghost:hover{background:var(--s2);color:var(--tx)}
.btn-green{background:var(--gr);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;min-height:34px}
.btn-full{width:100%;padding:14px;font-size:15px;min-height:52px}
.btn-outline-blue{background:var(--acd);color:var(--ac);border:1.5px solid rgba(37,99,235,.3)}
.btn-outline-green{background:var(--grd);color:var(--gr);border:1.5px solid var(--grb)}
.btn-outline-amber{background:var(--amd);color:var(--am);border:1.5px solid var(--amb)}
.btn-outline-red{background:var(--red);color:var(--re);border:1.5px solid var(--reb)}

/* ── FORMS ── */
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--s2);border:1.5px solid var(--bd2);border-radius:var(--r);color:var(--tx);padding:10px 14px;font-size:14px;font-family:var(--fj);outline:none;transition:border-color .15s;min-height:46px}
.form-row input:focus,.form-row select:focus{border-color:var(--ac);background:#fff}
.form-row input::placeholder{color:var(--di)}
.error-box{background:var(--red);border:1.5px solid var(--re);color:var(--re);border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:12px;display:none}
.error-box.show{display:block}
.form-hint{font-size:11px;color:var(--di);margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
.login-card{background:#fff;border:1.5px solid var(--bd);border-radius:20px;padding:44px 36px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.1)}
.login-logo{text-align:center;margin-bottom:32px}
.login-brand{font-size:22px;font-weight:900;letter-spacing:.1em;color:var(--tx)}
.login-brand span{color:var(--ac)}
.login-sub{font-size:12px;color:var(--mu);margin-top:5px;letter-spacing:.05em}
.pw-strength{height:3px;border-radius:2px;background:var(--bd);margin-top:5px;overflow:hidden}
.pw-bar{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}
@media(max-width:400px){.login-card{padding:32px 24px;border-radius:0;border:none;box-shadow:none;min-height:100vh}}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
#app.active{display:flex}

/* ── HEADER ── */
.hdr{background:#fff;border-bottom:1px solid var(--bd);padding:0 16px;height:var(--hdr);display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;z-index:20}
.hdr-brand{font-size:16px;font-weight:900;letter-spacing:.08em;color:var(--tx)}
.hdr-brand span{color:var(--ac)}
.hdr-page{font-size:13px;color:var(--mu);font-weight:500}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.hdr-icon-btn{background:transparent;border:none;padding:8px;border-radius:var(--r);cursor:pointer;color:var(--mu);display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px}
.hdr-icon-btn:hover{background:var(--s2);color:var(--tx)}
.user-pill{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 5px;border:1.5px solid var(--bd);border-radius:20px;cursor:pointer}
.user-av{width:26px;height:26px;background:var(--ac);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:0}
.user-av.adm{background:var(--am)}
.user-name{font-size:12px;font-weight:700;color:var(--tx)}
.role-chip{font-size:10px;padding:2px 6px;border-radius:6px;font-weight:700}
.role-chip.admin{background:var(--amd);color:var(--am)}
.role-chip.user{background:var(--s3);color:var(--mu)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--s2)}
.page{display:none;padding:14px 14px calc(14px + var(--nav));min-height:100%}
.page.active{display:block}
.page-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.page-title{font-size:18px;font-weight:900;letter-spacing:.02em}
.badge{background:var(--s3);border:1px solid var(--bd);color:var(--mu);font-size:11px;padding:2px 8px;border-radius:8px;font-family:var(--fn)}
.page-acts{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:#fff;border-top:1px solid var(--bd);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.bnt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;font-family:var(--fj);color:var(--di);transition:color .15s;padding:0 4px;min-width:0}
.bnt:active{opacity:.7}
.bnt.active{color:var(--ac)}
.bnt-icon{font-size:20px;line-height:1;display:block}
.bnt-lbl{font-size:10px;font-weight:700;letter-spacing:.02em;white-space:nowrap}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:#fff;border:1.5px solid var(--bd);border-radius:var(--r2);padding:14px;display:flex;flex-direction:column;gap:4px}
.stat-lbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em}
.stat-val{font-size:26px;font-weight:700;font-family:var(--fn);line-height:1;color:var(--tx)}
.stat-val.red{color:var(--re)}
.stat-val.amber{color:var(--am)}
.stat-val.green{color:var(--gr)}
.stat-sub{font-size:11px;color:var(--di)}

/* ── SEARCH BAR ── */
.search-bar{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--bd2);border-radius:var(--r);padding:8px 12px;margin-bottom:12px}
.search-bar input{background:none;border:none;outline:none;color:var(--tx);font-family:var(--fj);font-size:14px;flex:1;min-width:0}
.search-bar input::placeholder{color:var(--di)}
.search-icon{color:var(--di);flex-shrink:0;font-size:16px}

/* ── INVENTORY CARDS ── */
.icard{background:#fff;border:1.5px solid var(--bd);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.icard.warn{border-color:rgba(245,158,11,.4)}
.icard.zero{border-color:rgba(239,68,68,.4)}
.icard-head{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.icard-info{flex:1;min-width:0}
.icard-name{font-size:15px;font-weight:700;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icard-meta{font-size:11px;color:var(--mu);margin-top:2px;font-family:var(--fn)}
.icard-kansei{text-align:right;flex-shrink:0}
.icard-kansei-num{font-size:28px;font-weight:700;font-family:var(--fn);color:var(--gr);line-height:1}
.icard-kansei-num.warn-num{color:var(--am)}
.icard-kansei-num.zero-num{color:var(--re)}
.icard-kansei-lbl{font-size:10px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.icard-stages{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 12px;border-top:1px solid var(--bd);padding-top:10px}
.stage-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:600}
.sc-zairyou{background:var(--ind);color:var(--in)}
.sc-kakou{background:var(--acd);color:var(--ac)}
.sc-bari{background:var(--amd);color:var(--am)}
.sc-kansei{background:var(--grd);color:var(--gr)}
.sc-furyou{background:var(--red);color:var(--re)}
.sc-dantori{background:var(--pud);color:var(--pu)}
.sc-num{font-family:var(--fn);font-weight:700}
.icard-acts{display:flex;gap:6px;padding:0 14px 12px;flex-wrap:wrap}

/* ── PROCESS CARDS ── */
.pcard{background:#fff;border:1.5px solid var(--bd);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.pcard-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.pcard-head:active{background:var(--s2)}
.pcard-title{flex:1;min-width:0}
.pcard-name{font-size:15px;font-weight:700}
.pcard-code{font-size:11px;color:var(--mu);font-family:var(--fn)}
.pcard-dots{display:flex;gap:4px;align-items:center}
.pcard-dot{width:8px;height:8px;border-radius:50%}
.pcard-total{font-family:var(--fn);font-size:14px;font-weight:700;color:var(--mu);text-align:right;flex-shrink:0}
.pcard-chevron{color:var(--di);transition:transform .2s;flex-shrink:0;font-size:12px}
.pcard.open .pcard-chevron{transform:rotate(180deg)}
.pcard-body{display:none;border-top:1px solid var(--bd)}
.pcard.open .pcard-body{display:block}

/* ── STAGE ROWS ── */
.stage-row{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:8px}
.stage-row:last-child{border-bottom:none}
.stage-row.empty{opacity:.45}
.stage-row-top{display:flex;align-items:center;gap:8px}
.stage-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stage-name{font-size:13px;font-weight:700;flex:1}
.stage-qty{font-family:var(--fn);font-size:20px;font-weight:700;line-height:1}
.stage-unit{font-size:11px;color:var(--mu);margin-left:2px;font-family:var(--fj);font-weight:400}
.stage-btns{display:flex;flex-wrap:wrap;gap:5px}
.mv{display:inline-flex;align-items:center;padding:6px 10px;border-radius:20px;border:none;cursor:pointer;font-family:var(--fj);font-size:12px;font-weight:700;transition:all .1s;white-space:nowrap;min-height:32px;letter-spacing:.01em}
.mv:active{transform:scale(.95)}
.mv-k{background:var(--acd);color:var(--ac);border:1.5px solid rgba(37,99,235,.25)}
.mv-k:hover{background:#dbeafe}
.mv-bari{background:var(--amd);color:var(--am);border:1.5px solid var(--amb)}
.mv-bari:hover{background:#fde68a}
.mv-kansei{background:var(--grd);color:var(--gr);border:1.5px solid var(--grb)}
.mv-kansei:hover{background:#a7f3d0}
.mv-furyou{background:var(--red);color:var(--re);border:1.5px solid var(--reb)}
.mv-furyou:hover{background:#fecaca}
.mv-dantori{background:var(--pud);color:var(--pu);border:1.5px solid var(--pub)}
.mv-dantori:hover{background:#e9d5ff}

/* ── IO PAGE ── */
.io-tabs{display:flex;gap:0;margin-bottom:16px;border:1.5px solid var(--bd2);border-radius:var(--r2);overflow:hidden}
.io-tab{flex:1;padding:12px;border:none;background:var(--s2);color:var(--mu);font-family:var(--fj);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.io-tab.active{background:var(--ac);color:#fff}
.io-panel{display:none}
.io-panel.active{display:block}
.item-picker{background:#fff;border:1.5px solid var(--bd2);border-radius:var(--r2);overflow:hidden;margin-bottom:12px;max-height:240px;overflow-y:auto}
.item-pick-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.item-pick-row:last-child{border-bottom:none}
.item-pick-row:hover{background:var(--s2)}
.item-pick-row.selected{background:var(--acd);border-left:3px solid var(--ac)}
.item-pick-name{font-weight:700;font-size:14px;flex:1}
.item-pick-code{font-size:11px;color:var(--mu);font-family:var(--fn)}
.item-pick-qty{font-family:var(--fn);font-size:14px;font-weight:700;text-align:right}
.io-selected-info{background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;font-size:13px}
.io-available{font-size:13px;color:var(--mu);margin-bottom:4px}
.io-avail-num{font-family:var(--fn);font-size:20px;font-weight:700;color:var(--gr)}

/* ── QTY ADJUSTER ── */
.qty-adj-wrap{display:flex;align-items:stretch;border-radius:var(--r2);overflow:hidden;border:1.5px solid var(--bd2);min-height:64px;margin:8px 0 16px}
.adj-minus-side,.adj-plus-side{display:flex;flex:1}
.adj-center{flex:0 0 110px;width:110px;border-left:1.5px solid var(--bd2);border-right:1.5px solid var(--bd2);position:relative;display:flex;align-items:stretch}
.adj-input{width:100%;min-height:64px;background:var(--s2);border:none;color:var(--tx);padding:8px 28px 8px 8px;font-size:28px;font-family:var(--fn);font-weight:700;text-align:center;outline:none;-webkit-appearance:none;-moz-appearance:textfield;appearance:textfield}
.adj-input::-webkit-inner-spin-button,.adj-input::-webkit-outer-spin-button{-webkit-appearance:none}
.adj-input:focus{background:#fff}
.adj-unit{position:absolute;right:6px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:11px;pointer-events:none}
.adj-btn{display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-family:var(--fn);font-weight:700;line-height:1;user-select:none;touch-action:manipulation;outline:none;flex:1;font-size:12px;transition:background .08s;padding:0 3px;white-space:nowrap}
.adj-btn:active{opacity:.7}
.adj-minus-side .adj-btn{background:#f3f4f6;color:#4b5563;border-right:1px solid var(--bd2)}
.adj-minus-side .adj-btn:last-child{border-right:none}
.adj-minus-side .adj-btn:hover{background:#e5e7eb}
.adj-plus-side .adj-btn{background:#eff6ff;color:var(--ac);border-left:1px solid var(--bd2)}
.adj-plus-side .adj-btn:first-child{border-left:none}
.adj-plus-side .adj-btn:hover{background:#dbeafe}

/* ── HISTORY ── */
.hist-card{background:#fff;border:1.5px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.hist-card-row{padding:12px 14px;display:flex;align-items:center;gap:10px}
.hist-chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap}
.hc-nyuko{background:var(--grd);color:var(--gr)}
.hc-shukko{background:var(--red);color:var(--re)}
.hc-move{background:var(--acd);color:var(--ac)}
.hc-corr{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.hist-item-name{font-weight:700;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-qty{font-family:var(--fn);font-size:14px;font-weight:700}
.hist-detail{font-size:12px;color:var(--mu);padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:8px}
.hist-dl{font-size:11px;color:var(--di)}
.hist-time{font-size:11px;color:var(--di);white-space:nowrap;font-family:var(--fn)}
.correct-btn{background:none;border:1.5px solid var(--reb);color:var(--re);border-radius:var(--r);padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--fj);min-height:30px}
.correct-btn:hover{background:var(--red)}

/* ── USER TABLE ── */
.user-card{background:#fff;border:1.5px solid var(--bd);border-radius:var(--r2);margin-bottom:8px;overflow:hidden}
.user-card-row{padding:12px 14px;display:flex;align-items:center;gap:10px}
.user-actions{display:flex;gap:6px;flex-wrap:wrap}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center;padding:0}
.overlay.show{display:flex}
@media(min-width:600px){.overlay{align-items:center;padding:16px}}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;box-shadow:0 -8px 32px rgba(0,0,0,.15);display:flex;flex-direction:column;max-height:92vh}
@media(min-width:600px){.modal{border-radius:16px;max-height:calc(100vh - 32px)}}
.modal-head{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 12px;display:block}
@media(min-width:600px){.modal-handle{display:none}}
.modal-title{font-size:16px;font-weight:900}
.modal-x{background:none;border:none;color:var(--mu);cursor:pointer;font-size:20px;line-height:1;padding:4px;border-radius:6px;min-width:36px;min-height:36px}
.modal-x:hover{color:var(--tx);background:var(--s2)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.modal-foot .btn{flex:1}
.divider{height:1px;background:var(--bd);margin:14px 0}
.sec-label{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.transfer-info{background:var(--s2);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;border:1.5px solid var(--bd)}
.transfer-row{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.transfer-arrow{color:var(--di)}
.transfer-stock{font-size:12px;color:var(--mu);margin-top:4px;font-family:var(--fn)}
.move-warn{background:var(--amd);border:1.5px solid var(--am);border-radius:var(--r);padding:10px 12px;font-size:13px;color:#78350f;margin-bottom:12px;display:none}
.move-warn.show{display:block}

/* ── SUGGEST ── */
.sug-wrap{position:relative}
.sug-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--bd2);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:500;max-height:180px;overflow-y:auto;display:none;margin-top:2px}
.sug-list.open{display:block}
.sug-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;min-height:44px}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:var(--s2)}

/* ── TOAST ── */
#toasts{position:fixed;bottom:calc(var(--nav) + 12px);left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
@keyframes tIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(8px)}}
.toast{background:#1f2937;color:#fff;border-radius:var(--r3);padding:10px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap;animation:tIn .2s ease}
.toast.ok{background:#065f46}
.toast.err{background:#991b1b}
.toast.warn{background:#78350f}

/* ── EMPTY STATE ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;color:var(--di)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.7}
.empty-txt{font-size:14px;color:var(--mu)}

/* ── MISC ── */
.sec-sep{height:1px;background:var(--bd);margin:16px 0}
.admin-only{display:none}
.text-red{color:var(--re)}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-sel{background:#fff;border:1.5px solid var(--bd2);border-radius:var(--r);color:var(--tx);padding:7px 10px;font-family:var(--fj);font-size:13px;outline:none;cursor:pointer;min-height:38px}
.label-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.total-info{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mu);margin-bottom:14px}
.total-num{font-family:var(--fn);font-size:14px;font-weight:700;color:var(--tx)}
.io-sep{text-align:center;font-size:13px;color:var(--di);margin:10px 0}

/* ── ACCORDION ── */
.acc-item{border-bottom:1px solid var(--bd)}
.acc-item:last-child{border-bottom:none}
.acc-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.acc-hdr:active{background:var(--s2)}
.acc-chev{font-size:12px;color:var(--di);transition:transform .2s;flex-shrink:0}
.acc-item.open .acc-chev{transform:rotate(180deg)}
.acc-body{display:none;padding:10px 14px 14px;border-top:1px solid var(--bd)}
.acc-item.open .acc-body{display:block}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-brand">STOCKS<span>.</span></div>
      <div class="login-sub">製造現場 在庫管理システム v10</div>
    </div>
    <div id="login-err" class="error-box"></div>
    <div class="form-row">
      <label>ユーザー名</label>
      <input id="li-user" type="text" placeholder="username" autocomplete="username">
    </div>
    <div class="form-row">
      <label>パスワード</label>

<!-- ═══ APP ═══ -->

    <div class="hdr-page" id="hdr-page-name">在庫一覧</div>

      </button>
      <div class="user-pill" onclick="doLogout()">

  <!-- MAIN -->

    <!-- ① 在庫一覧 -->

    <!-- ② 工程管理 -->

      </div>

        <span class="search-icon">🔍</span>

      <div id="proc-list"></div>
    </div>

    <!-- ③ 入出庫 -->

      <div class="page-hdr"><div class="page-title">入出庫</div></div>
      <div class="io-tabs">

      <div class="io-panel active" id="io-panel-in">

        <div class="search-bar" style="margin-bottom:8px">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="品目検索..." id="in-search" oninput="renderIOItemList('in')">
        </div>
        <div class="item-picker" id="in-item-list"></div>
        <div id="in-selected-info" style="display:none">
          <div class="io-selected-info">
            <div id="in-item-name" style="font-weight:700;font-size:15px;margin-bottom:4px"></div>
            <div class="io-available">現在の成形素材在庫</div>

          <div class="sec-label">入庫数量</div>
          <div class="qty-adj-wrap" id="in-adj"></div>
          <div id="in-err" class="error-box"></div>

        </div>
        <div id="in-prompt" class="empty"><div class="empty-icon">📋</div><div class="empty-txt">品目を選んでください</div></div>

      <!-- 出庫パネル -->

        <div class="search-bar" style="margin-bottom:8px">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="品目検索..." id="out-search" oninput="renderIOItemList('out')">
        </div>
        <div class="item-picker" id="out-item-list"></div>
        <div id="out-selected-info" style="display:none">
          <div class="io-selected-info">
            <div id="out-item-name" style="font-weight:700;font-size:15px;margin-bottom:4px"></div>
            <div class="io-available">現在の完成品在庫</div>
            <div class="io-avail-num" id="out-current-qty" style="color:var(--gr)">0</div>
          </div>
          <div class="sec-label">出庫（出荷）数量</div>
          <div class="qty-adj-wrap" id="out-adj"></div>
          <div id="out-err" class="error-box"></div>

        <div id="out-prompt" class="empty"><div class="empty-icon">📋</div><div class="empty-txt">品目を選んでください</div></div>
      </div>
    </div>

    <!-- ④ 操作履歴 -->

        <div class="page-title">操作履歴</div>
        <span class="badge" id="hist-count">0件</span>

            <option value="出荷">出荷</option>

      </div>

    <div id="page-users" class="page">

  </main>

  <!-- BOTTOM NAV -->

    <button class="bnt" id="bnt-io" onclick="navTo('io')">

</div><!-- #app -->

<!-- ═══ MODALS ═══ -->

<div class="overlay" id="modal-move">

    <div class="modal-head">

      <button class="modal-x" onclick="closeModal('modal-item')">✕</button>

<!-- ユーザー追加 -->

<script>
// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function uuid(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16)})}
function now(){return new Date().toISOString()}
function fmtDate(iso){var d=new Date(iso);return (d.getMonth()+1)+'/'+(d.getDate())+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fmtNum(n){return Number(n||0).toLocaleString('ja-JP')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hashPw(s){var h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h)+s.charCodeAt(i);h=h&h}return Math.abs(h).toString(36)+'_'+s.length}

// ═══════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════
var STAGES = [
  {key:'zairyou', label:'成形素材',  short:'成形',  color:'#6366f1', cls:'sc-zairyou'},
  {key:'k1',      label:'加工①',    short:'加工①', color:'#3b82f6', cls:'sc-kakou'},
  {key:'k2',      label:'加工②',    short:'加工②', color:'#0ea5e9', cls:'sc-kakou'},
  {key:'k3',      label:'加工③',    short:'加工③', color:'#06b6d4', cls:'sc-kakou'},
  {key:'k4',      label:'加工④',    short:'加工④', color:'#0891b2', cls:'sc-kakou'},
  {key:'k5',      label:'加工⑤',    short:'加工⑤', color:'#0d9488', cls:'sc-kakou'},
  {key:'k6',      label:'加工⑥',    short:'加工⑥', color:'#059669', cls:'sc-kakou'},
  {key:'bari',    label:'バリ取り前', short:'バリ前', color:'#f59e0b', cls:'sc-bari'},
  {key:'kansei',  label:'完成品',    short:'完成品', color:'#10b981', cls:'sc-kansei'},
  {key:'furyou',  label:'不良品',    short:'不良',   color:'#ef4444', cls:'sc-furyou'},
  {key:'dantori', label:'段取り品',  short:'段取り', color:'#8b5cf6', cls:'sc-dantori'}
];

// 移動可能先マップ
var MOVE_RULES = {
  zairyou: ['k1','furyou','dantori'],
  k1:      ['k2','bari','kansei','furyou','dantori'],
  k2:      ['k3','bari','kansei','furyou','dantori'],
  k3:      ['k4','bari','kansei','furyou','dantori'],
  k4:      ['k5','bari','kansei','furyou','dantori'],
  k5:      ['k6','bari','kansei','furyou','dantori'],
  k6:      ['bari','kansei','furyou','dantori'],
  bari:    ['kansei'],
  kansei:  [],
  furyou:  [],
  dantori: []
};

// 工程ビューで表示するステージ（完成品・不良品・段取り品はメイン在庫表示に）
var PROCESS_STAGES = ['zairyou','k1','k2','k3','k4','k5','k6','bari'];

function stageByKey(k){return STAGES.find(function(s){return s.key===k;})||{key:k,label:k,short:k,color:'#999',cls:''}}

function totalStock(proc){
  return STAGES.reduce(function(s,st){return s+(proc[st.key]||0);},0);
}
function wipTotal(proc){
  return (proc.zairyou||0)+(proc.k1||0)+(proc.k2||0)+(proc.k3||0)+(proc.k4||0)+(proc.k5||0)+(proc.k6||0);
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
var DB = {users:[],items:[],history:[],lines:[]};
var currentUser = null;
var pendingMove = null;
var pendingIOItem = null;
var pendingIOType = null; // 'in' | 'out'
var expandedItems = {}; // itemId -> bool
var DB_KEY = 'stocks_v10';
var SESS_KEY = 'stocks_sess_v10';
var HIST_MAX = 5000;

// ─── Operator history ───
function loadOpHist(){try{return JSON.parse(localStorage.getItem('stocks_op_hist')||'[]');}catch(e){return [];}}
function pushOpHist(v){if(!v)return;var l=loadOpHist();l=l.filter(function(x){return x!==v;});l.unshift(v);localStorage.setItem('stocks_op_hist',JSON.stringify(l.slice(0,20)));}
function getOpSuggests(q){
  var hist=loadOpHist();
  var fromDb=DB.history.map(function(h){return h.operator||'';}).filter(Boolean);
  var all=hist.slice();fromDb.forEach(function(v){if(all.indexOf(v)<0)all.push(v);});
  var seen={};all=all.filter(function(v){if(!v||seen[v])return false;seen[v]=true;return true;});
  if(q){q=q.toLowerCase();all=all.filter(function(v){return v.toLowerCase().indexOf(q)>=0;});}
  return all.slice(0,8);
}
function onOpInput(pfx){
  var q=document.getElementById(pfx+'-operator').value;

    ],

  };

function migrateDB(){
  // v9→v10 migration: if items have old process format, convert
  DB.items.forEach(function(it){
    if(!it.process){it.process=emptyProc();return;}
    // old: {wip, bari, done} → new
    var p=it.process;
    if(p.wip!==undefined&&p.k1===undefined){
      var newp=emptyProc();
      newp.k1=p.wip||0;
      newp.bari=p.bari||0;
      newp.kansei=p.done||0;
      it.process=newp;
    }
    // ensure all keys exist
    STAGES.forEach(function(s){if(p[s.key]===undefined)p[s.key]=0;});
  });
}

function saveDB(){localStorage.setItem(DB_KEY,JSON.stringify(DB));}
function saveSession(){if(currentUser)localStorage.setItem(SESS_KEY,currentUser.id);}
function clearSession(){localStorage.removeItem(SESS_KEY);}

function addHistory(type,item,qty,fromKey,toKey,operator){
  var fromLbl=fromKey?stageByKey(fromKey).label:'';
  var toLbl=toKey?stageByKey(toKey).label:'';
  DB.history.unshift({
    id:uuid(),timestamp:now(),type:type,
    itemId:item.id,itemName:item.name,qty:qty,
    fromStage:fromLbl,toStage:toLbl,
    operator:operator||'',
    username:currentUser?currentUser.username:'',
    role:currentUser?currentUser.role:''
  });
  if(DB.history.length>HIST_MAX)DB.history=DB.history.slice(0,HIST_MAX);
}

function doLogin(){
  var u=document.getElementById('li-user').value.trim();
  var p=document.getElementById('li-pw').value;
  var err=document.getElementById('login-err');
  err.classList.remove('show');
  if(!u||!p){err.textContent='ユーザー名とパスワードを入力してください';err.classList.add('show');return;}
  var user=DB.users.find(function(x){return x.username===u;});

  currentUser=user;saveSession();bootApp();
}

  var totalWip=items.reduce(function(s,it){return s+wipTotal(it.process);},0);

  var items=DB.items.filter(function(it){

    if(f==='warn'&&!(it.process.kansei<=it.threshold&&it.process.kansei>0))return false;

function renderProcess(){
  var q=(document.getElementById('proc-search').value||'').toLowerCase();
  var showZero=document.getElementById('show-zero-stages').checked;
  var items=DB.items.filter(function(it){
    if(q&&!it.name.toLowerCase().includes(q)&&!it.code.toLowerCase().includes(q))return false;
    return true;
  });
  var el=document.getElementById('proc-list');
  if(!items.length){el.innerHTML='<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-txt">品目がありません</div></div>';return;}
  el.innerHTML=items.map(function(it){
    var wip=wipTotal(it.process);
    var bari=it.process.bari||0;
    var total=wip+bari;
    var isOpen=expandedItems[it.id];
    // dots for active stages
    var dots=PROCESS_STAGES.filter(function(k){return (it.process[k]||0)>0;}).map(function(k){
      var s=stageByKey(k);
      return '<div class="pcard-dot" style="background:'+s.color+'" title="'+s.label+'"></div>';
    }).join('');
    var stageRows=PROCESS_STAGES.map(function(k){
      var s=stageByKey(k);
      var qty=it.process[k]||0;
      if(!showZero&&qty===0)return '';
      var dests=MOVE_RULES[k]||[];
      var btns=qty>0?dests.map(function(dk){
        var ds=stageByKey(dk);
        var mvCls=dk==='furyou'?'mv-furyou':dk==='dantori'?'mv-dantori':dk==='kansei'?'mv-kansei':dk==='bari'?'mv-bari':'mv-k';
        return '<button class="mv '+mvCls+'" onclick="openMoveModal(\''+it.id+'\',\''+k+'\',\''+dk+'\')">→'+ds.short+'</button>';
      }).join(''):
      (dests.length?'<span style="font-size:12px;color:var(--di)">在庫なし</span>':'<span style="font-size:12px;color:var(--di)">移動不可</span>');
      return '<div class="stage-row'+(qty===0?' empty':'')+'">'
        +'<div class="stage-row-top">'
          +'<div class="stage-dot" style="background:'+s.color+'"></div>'
          +'<div class="stage-name">'+esc(s.label)+'</div>'
          +'<div><span class="stage-qty" style="color:'+s.color+'">'+fmtNum(qty)+'</span><span class="stage-unit">'+esc(it.unit)+'</span></div>'
        +'</div>'
        +(dests.length?'<div class="stage-btns">'+btns+'</div>':'')
      +'</div>';
    }).join('');
    return '<div class="pcard'+(isOpen?' open':'')+'" id="pcard-'+it.id+'">'
      +'<div class="pcard-head" onclick="togglePcard(\''+it.id+'\')">'
        +'<div class="pcard-title"><div class="pcard-name">'+esc(it.name)+'</div><div class="pcard-code">'+esc(it.code)+'</div></div>'
        +'<div class="pcard-dots" title="アクティブ工程">'+dots+'</div>'
        +'<div class="pcard-total">'+fmtNum(total)+'<span style="font-size:11px;color:var(--di)"> '+esc(it.unit)+'</span></div>'
        +'<span class="pcard-chevron">▼</span>'
      +'</div>'
      +'<div class="pcard-body">'+stageRows+'</div>'
    +'</div>';
  }).join('');
}

function togglePcard(id){
  expandedItems[id]=!expandedItems[id];
  var el=document.getElementById('pcard-'+id);
  if(el)el.classList.toggle('open',!!expandedItems[id]);
}

function renderIOItemList(type){
  var q=(document.getElementById(type+'-search').value||'').toLowerCase();
  var items=DB.items.filter(function(it){
    if(q&&!it.name.toLowerCase().includes(q)&&!it.code.toLowerCase().includes(q))return false;
    return true;
  });
  var el=document.getElementById(type+'-item-list');
  el.innerHTML=items.map(function(it){
    var qty=type==='in'?(it.process.zairyou||0):(it.process.kansei||0);
    var sel=selectedIOItem[type]===it.id;
    return '<div class="item-pick-row'+(sel?' selected':'')+'" onclick="selectIOItem(\''+type+'\',\''+it.id+'\')">'
      +'<div><div class="item-pick-name">'+esc(it.name)+'</div><div class="item-pick-code">'+esc(it.code)+'</div></div>'
      +'<div class="item-pick-qty" style="color:'+(type==='out'?'var(--gr)':'var(--ac)')+'">'
        +fmtNum(qty)+'<span style="font-size:10px;color:var(--mu)"> '+esc(it.unit)+'</span>'
      +'</div>'
    +'</div>';
  }).join('');
  if(!items.length)el.innerHTML='<div class="empty" style="padding:24px"><div class="empty-txt">品目がありません</div></div>';
}

function selectIOItem(type,itemId){
  selectedIOItem[type]=itemId;
  var it=DB.items.find(function(i){return i.id===itemId;});
  if(!it)return;
  renderIOItemList(type);
  var infoEl=document.getElementById(type+'-selected-info');
  var promptEl=document.getElementById(type+'-prompt');
  if(infoEl)infoEl.style.display='';
  if(promptEl)promptEl.style.display='none';
  if(type==='in'){
    document.getElementById('in-item-name').textContent=it.name;
    document.getElementById('in-current-qty').textContent=fmtNum(it.process.zairyou||0)+it.unit;
    document.getElementById('in-err').classList.remove('show');
    renderQtyAdj('in-adj',it.unit,[1,10,50,100]);
  } else {
    document.getElementById('out-item-name').textContent=it.name;
    document.getElementById('out-current-qty').textContent=fmtNum(it.process.kansei||0)+it.unit;
    document.getElementById('out-err').classList.remove('show');
    renderQtyAdj('out-adj',it.unit,[1,10,50,100]);
  }
}

function execNyuko(){
  var id=selectedIOItem['in'];
  if(!id){toast('品目を選択してください','err');return;}
  var it=DB.items.find(function(i){return i.id===id;});
  if(!it)return;
  var q=parseInt(document.getElementById('in-adj-input').value)||0;
  var err=document.getElementById('in-err');err.classList.remove('show');
  if(!q||q<=0){err.textContent='入庫数量を入力してください';err.classList.add('show');return;}
  it.process.zairyou=(it.process.zairyou||0)+q;
  it.updatedAt=now();
  addHistory('入庫',it,q,null,'zairyou','');
  saveDB();
  document.getElementById('in-current-qty').textContent=fmtNum(it.process.zairyou)+it.unit;
  document.getElementById('in-adj-input').value='';
  renderIOItemList('in');
  renderStats();
  toast(it.name+' を '+fmtNum(q)+it.unit+' 入庫しました','ok');
}

function execShukko(){
  var id=selectedIOItem['out'];
  if(!id){toast('品目を選択してください','err');return;}
  var it=DB.items.find(function(i){return i.id===id;});
  if(!it)return;
  var q=parseInt(document.getElementById('out-adj-input').value)||0;
  var err=document.getElementById('out-err');err.classList.remove('show');
  if(!q||q<=0){err.textContent='出荷数量を入力してください';err.classList.add('show');return;}
  if(q>(it.process.kansei||0)){err.textContent='完成品在庫（'+fmtNum(it.process.kansei)+'）を超えています';err.classList.add('show');return;}
  it.process.kansei=(it.process.kansei||0)-q;
  it.updatedAt=now();
  addHistory('出荷',it,q,'kansei',null,'');
  saveDB();
  document.getElementById('out-current-qty').textContent=fmtNum(it.process.kansei)+it.unit;
  document.getElementById('out-adj-input').value='';
  renderIOItemList('out');
  renderStats();
  toast(it.name+' を '+fmtNum(q)+it.unit+' 出荷しました','ok');
}

function openMoveModal(itemId,fromKey,toKey){
  var it=DB.items.find(function(i){return i.id===itemId;});
  if(!it)return;
  var fromS=stageByKey(fromKey);
  var toS=stageByKey(toKey);
  pendingMove={itemId:itemId,fromKey:fromKey,toKey:toKey};
  document.getElementById('mv-title').textContent=fromS.label+' → '+toS.label;
  document.getElementById('mv-from-lbl').textContent=fromS.label;
  document.getElementById('mv-to-lbl').textContent=toS.label;
  document.getElementById('mv-item-info').textContent=it.name+' — 現在: '+fmtNum(it.process[fromKey]||0)+it.unit;
  document.getElementById('mv-warn').classList.remove('show');
  document.getElementById('mv-err').classList.remove('show');
  document.getElementById('mv-operator').value=currentUser&&currentUser.operator_name?currentUser.operator_name:'';
  renderQtyAdj('mv-adj',it.unit,[1,10,50]);
  openModal('modal-move');
}

function checkMoveWarn(){
  if(!pendingMove)return;
  var it=DB.items.find(function(i){return i.id===pendingMove.itemId;});
  if(!it)return;
  var available=it.process[pendingMove.fromKey]||0;
  var q=parseInt(document.getElementById('mv-adj-input').value)||0;
  var w=document.getElementById('mv-warn');
  if(available>0&&q>0&&q/available>=0.8)w.classList.add('show');
  else w.classList.remove('show');
}

function execMove(){
  if(!pendingMove)return;
  var it=DB.items.find(function(i){return i.id===pendingMove.itemId;});
  if(!it)return;
  var q=parseInt(document.getElementById('mv-adj-input').value)||0;
  var op=document.getElementById('mv-operator').value.trim();
  var err=document.getElementById('mv-err');err.classList.remove('show');
  if(!q||q<=0){err.textContent='移動数量を入力してください';err.classList.add('show');return;}
  var available=it.process[pendingMove.fromKey]||0;
  if(q>available){err.textContent='在庫（'+fmtNum(available)+it.unit+'）を超えています';err.classList.add('show');return;}
  it.process[pendingMove.fromKey]=available-q;
  it.process[pendingMove.toKey]=(it.process[pendingMove.toKey]||0)+q;
  it.updatedAt=now();
  var fromS=stageByKey(pendingMove.fromKey);
  var toS=stageByKey(pendingMove.toKey);
  addHistory('移動',it,q,pendingMove.fromKey,pendingMove.toKey,op);
  if(op)pushOpHist(op);
  saveDB();
  closeModal('modal-move');
  renderProcess();
  renderStats();
  toast(fromS.label+' → '+toS.label+' '+fmtNum(q)+it.unit,'ok');
}

var _adjHT=null,_adjHI=null;
function renderQtyAdj(containerId,unit,presets){
  presets=presets||[1,10,50];
  var el=document.getElementById(containerId);if(!el)return;
  var inputId=containerId+'-input';
  var mHtml=presets.slice().reverse().map(function(v){
    return '<button type="button" class="adj-btn" data-d="-'+v+'">−'+v+'</button>';
  }).join('');
  var pHtml=presets.map(function(v){
    return '<button type="button" class="adj-btn" data-d="+'+v+'">＋'+v+'</button>';
  }).join('');
  el.innerHTML='<div class="adj-minus-side">'+mHtml+'</div>'
    +'<div class="adj-center"><input type="number" id="'+inputId+'" min="0" placeholder="0" class="adj-input" oninput="checkMoveWarn()"><span class="adj-unit" id="'+containerId+'-unit">'+(unit||'')+'</span></div>'
    +'<div class="adj-plus-side">'+pHtml+'</div>';
  el.querySelectorAll('.adj-btn').forEach(function(btn){
    var delta=parseInt(btn.dataset.d,10);
    var isUnit=Math.abs(delta)===1;
    function apply(){var inp=document.getElementById(inputId);var v=Math.max(0,(parseInt(inp.value)||0)+delta);inp.value=v;checkMoveWarn();}
    function stop(){if(_adjHT){clearTimeout(_adjHT);_adjHT=null;}if(_adjHI){clearInterval(_adjHI);_adjHI=null;}btn.style.opacity='';}
    function start(){btn.style.opacity='.7';apply();if(isUnit){_adjHT=setTimeout(function(){_adjHI=setInterval(apply,100);},350);}}
    btn.addEventListener('mousedown',function(e){e.preventDefault();start();});
    btn.addEventListener('mouseup',stop);btn.addEventListener('mouseleave',stop);
    btn.addEventListener('touchstart',function(e){e.preventDefault();start();},{passive:false});
    btn.addEventListener('touchend',stop);btn.addEventListener('touchcancel',stop);
  });
  // focus input
  setTimeout(function(){var inp=document.getElementById(inputId);if(inp&&document.getElementById('modal-move').classList.contains('show'))inp.focus();},100);
}

function renderHistory(){
  var f=document.getElementById('hist-filter').value;
  var logs=DB.history.filter(function(h){
    if(f&&h.type!==f)return false;
    return true;
  });
  var el=document.getElementById('hist-list');
  document.getElementById('hist-count').textContent=logs.length+'件';
  if(!logs.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-txt">履歴がありません</div></div>';return;}
  var isAdm=currentUser&&currentUser.role==='admin';
  el.innerHTML=logs.slice(0,200).map(function(h){
    var chipCls=h.type==='入庫'?'hc-nyuko':h.type==='出荷'?'hc-shukko':h.type==='訂正'?'hc-corr':'hc-move';
    var flow=h.fromStage&&h.toStage?(h.fromStage+' → '+h.toStage):(h.fromStage||h.toStage||'');
    var correctBtn=isAdm&&!h.corrected&&h.type!=='訂正'?'<button class="correct-btn" onclick="confirmCorrect(\''+h.id+'\')">⎌ 訂正</button>':'';
    var corrMark=h.corrected?'<span style="color:var(--re);font-size:11px;margin-left:4px">[訂正済]</span>':'';
    return '<div class="hist-card">'
      +'<div class="hist-card-row">'
        +'<span class="hist-chip '+chipCls+'">'+esc(h.type)+'</span>'
        +'<span class="hist-item-name">'+esc(h.itemName||'—')+'</span>'+corrMark
        +'<span class="hist-qty">'+fmtNum(h.qty)+'</span>'
        +'<span class="hist-time">'+fmtDate(h.timestamp)+'</span>'
      +'</div>'
      +(flow||h.operator?'<div class="hist-detail">'
        +(flow?'<span><span class="hist-dl">移動 </span>'+esc(flow)+'</span>':'')
        +(h.operator?'<span><span class="hist-dl">作業者 </span>'+esc(h.operator)+'</span>':'')
        +(h.username?'<span><span class="hist-dl">ユーザー </span>'+esc(h.username)+'</span>':'')
        +(correctBtn?correctBtn:'')
      +'</div>':'')
    +'</div>';
  }).join('');
  if(logs.length>200){el.innerHTML+='<div class="empty" style="padding:16px"><div class="empty-txt">200件以上は省略されています</div></div>';}
}

function confirmCorrect(histId){
  var h=DB.history.find(function(x){return x.id===histId;});
  if(!h)return;
  openConfirm('訂正確認','「'+h.itemName+' '+fmtNum(h.qty)+'」の操作を訂正（取り消し）しますか？',function(){execCorrect(histId);});
}

function execCorrect(histId){
  if(!isAdmin()){toast('訂正は管理者のみ可能です','err');return;}
  var h=DB.history.find(function(x){return x.id===histId;});
  if(!h||h.corrected||h.type==='訂正')return;
  var it=DB.items.find(function(i){return i.id===h.itemId;});
  if(!it){toast('品目が見つかりません','err');return;}
  // reverse the operation
  if(h.type==='入庫'){
    // added to zairyou, so subtract
    var fromS=stageByKey('zairyou');
    if((it.process.zairyou||0)<h.qty){toast('訂正すると在庫がマイナスになります','err');return;}
    it.process.zairyou-=h.qty;
  } else if(h.type==='出荷'){
    // removed from kansei, so add back
    it.process.kansei=(it.process.kansei||0)+h.qty;
  } else if(h.type==='移動'){
    // moved from→to, so reverse
    var fk=STAGES.find(function(s){return s.label===h.fromStage;});
    var tk=STAGES.find(function(s){return s.label===h.toStage;});
    if(fk&&tk){
      if((it.process[tk.key]||0)<h.qty){toast('訂正すると在庫がマイナスになります','err');return;}
      it.process[tk.key]-=h.qty;
      it.process[fk.key]=(it.process[fk.key]||0)+h.qty;
    }
  }
  h.corrected=true;
  it.updatedAt=now();
  DB.history.unshift({id:uuid(),timestamp:now(),type:'訂正',itemId:it.id,itemName:it.name,qty:h.qty,fromStage:'',toStage:'',operator:'',username:currentUser?currentUser.username:'',role:currentUser?currentUser.role:'',corrected_ref:histId});
  saveDB();renderHistory();renderStats();
  toast('訂正しました','warn');
}

function showAddUserModal(){

function addUser(){
  var username=document.getElementById('au-name').value.trim();
  var pw=document.getElementById('au-pw').value;
  var role=document.getElementById('au-role').value;
  var err=document.getElementById('au-err');err.classList.remove('show');
  if(!username){err.textContent='ユーザー名を入力してください';err.classList.add('show');return;}
  if(!/^[a-zA-Z0-9_]+$/.test(username)){err.textContent='ユーザー名は英数字とアンダースコアのみ';err.classList.add('show');return;}
  if(DB.users.find(function(u){return u.username===username;})){err.textContent='このユーザー名は使用済みです';err.classList.add('show');return;}
  if(pw.length<6){err.textContent='パスワードは6文字以上にしてください';err.classList.add('show');return;}
  var opName=document.getElementById('au-operator').value.trim();
  DB.users.push({id:uuid(),username:username,passwordHash:hashPw(pw),role:role,operator_name:opName,createdAt:now()});
  saveDB();closeModal('modal-adduser');renderUsers();toast(username+' を追加しました','ok');
}

function confirmDeleteUser(id){
  if(id===currentUser.id){toast('自分自身は削除できません','err');return;}
  var u=DB.users.find(function(x){return x.id===id;});if(!u)return;
  openConfirm('ユーザー削除','「'+u.username+'」を削除しますか？',function(){
    DB.users=DB.users.filter(function(x){return x.id!==id;});saveDB();renderUsers();toast(u.username+' を削除しました','warn');
  });
}

function saveItem(){
  var id=document.getElementById('item-id').value;
  var name=document.getElementById('item-name').value.trim();
  var code=document.getElementById('item-code').value.trim();
  var unit=document.getElementById('item-unit').value.trim();
  var maker=document.getElementById('item-maker').value.trim();
  var threshold=parseInt(document.getElementById('item-threshold').value)||0;
  var err=document.getElementById('item-err');err.classList.remove('show');
  if(!name){err.textContent='品目名を入力してください';err.classList.add('show');return;}
  if(!code){err.textContent='品目コードを入力してください';err.classList.add('show');return;}
  if(!unit){err.textContent='単位を入力してください';err.classList.add('show');return;}
  if(!id){
    // 新規
    if(DB.items.find(function(i){return i.code===code;})){err.textContent='このコードは既に使用されています';err.classList.add('show');return;}
    var init=parseInt(document.getElementById('item-init').value)||0;
    var p=emptyProc();p.zairyou=init;
    DB.items.push({id:uuid(),name:name,code:code,unit:unit,maker:maker,process:p,threshold:threshold,updatedAt:now()});
    toast(name+' を登録しました','ok');
  } else {
    var it=DB.items.find(function(i){return i.id===id;});if(!it)return;
    if(DB.items.find(function(i){return i.code===code&&i.id!==id;})){err.textContent='このコードは既に使用されています';err.classList.add('show');return;}
    it.name=name;it.code=code;it.unit=unit;it.maker=maker;it.threshold=threshold;it.updatedAt=now();
    toast(name+' を更新しました','ok');
  }
  saveDB();closeModal('modal-item');renderInventory();renderStats();
}

function confirmDeleteItem(id){
  var it=DB.items.find(function(i){return i.id===id;});if(!it)return;
  openConfirm('品目削除','「'+it.name+'」を削除しますか？関連する履歴は残ります。',function(){
    DB.items=DB.items.filter(function(i){return i.id!==id;});saveDB();renderInventory();renderStats();toast(it.name+' を削除しました','warn');
  });
}

function updatePwStrength(){

  var s=0;
  if(pw.length>=6)s++;if(pw.length>=8)s++;if(/[0-9]/.test(pw))s++;if(/[^a-zA-Z0-9]/.test(pw))s++;
  var cols=['','#ef4444','#f59e0b','#10b981','#2563eb'];

function changePassword(){
  var cur=document.getElementById('pw-cur').value;
  var nw=document.getElementById('pw-new').value;
  var cf=document.getElementById('pw-conf').value;
  var err=document.getElementById('pw-err');err.classList.remove('show');
  if(!currentUser)return;
  if(currentUser.passwordHash!==hashPw(cur)){err.textContent='現在のパスワードが違います';err.classList.add('show');return;}
  if(nw.length<6){err.textContent='新しいパスワードは6文字以上';err.classList.add('show');return;}

}

//  CSV EXPORT
// ═══════════════════════════════════════════
function qt(s){return '"'+String(s||'').replace(/"/g,'""')+'"';}
function dateStr(){return new Date().toISOString().slice(0,10).replace(/-/g,'');}
function exportCSV(type){
  if(!isAdmin())return;
  var csv='',filename='';
  if(type==='items'){
    var headers=['品目ID','品目名','コード','単位','メーカー'].concat(STAGES.map(function(s){return s.label;})).concat(['総在庫','警告閾値','更新日時']);
    csv=headers.join(',')+'\n';
    csv+=DB.items.map(function(it){
      var row=[it.id,qt(it.name),qt(it.code),qt(it.unit),qt(it.maker||'')];
      STAGES.forEach(function(s){row.push(it.process[s.key]||0);});
      row.push(totalStock(it.process),it.threshold,it.updatedAt);
      return row.join(',');
    }).join('\n');
    filename='在庫一覧_'+dateStr()+'.csv';
  } else {
    csv='ID,日時,操作,品目名,数量,移動元,移動先,作業者,ユーザー,権限\n';
    csv+=DB.history.map(function(h){
      return [h.id,h.timestamp,qt(h.type),qt(h.itemName),h.qty,qt(h.fromStage||''),qt(h.toStage||''),qt(h.operator||''),qt(h.username),qt(h.role)].join(',');
    }).join('\n');
    filename='操作履歴_'+dateStr()+'.csv';
  }
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
  toast(filename+' をダウンロードしました','ok');
}

document.querySelectorAll('.overlay').forEach(function(ov){
  ov.addEventListener('mousedown',function(e){if(e.target===ov)closeModal(ov.id);});
});

function toast(msg,type){
  var el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  var icon={ok:'✓',err:'✕',warn:'⚠'}[type]||'ℹ';
  el.innerHTML='<span>'+icon+'</span><span>'+msg+'</span>';
  var c=document.getElementById('toasts');c.appendChild(el);
  setTimeout(function(){el.style.animation='tOut .2s ease forwards';setTimeout(function(){el.remove();},200);},3000);
}
