<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>在庫管理システム</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --ok: #22c55e;
    --ng: #ef4444;
    --warn: #f59e0b;
    --text: #e8e8f0;
    --text2: #8888aa;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Hiragino Sans', 'Meiryo', sans-serif; font-size: 15px; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100dvh; }
  #header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header h1 { font-size: 17px; font-weight: 700; letter-spacing: .5px; }
  #header .user-info { font-size: 12px; color: var(--text2); text-align: right; line-height: 1.4; }
  #nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 12px 4px; font-size: 13px; font-weight: 600; color: var(--text2); background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; transition: color .15s, border-color .15s; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  #main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .page { display: none; padding: 14px; }
  .page.active { display: block; }

  /* ── Cards / Sections ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
  .section-label { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }

  /* ── Form elements ── */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 600; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; padding: 11px 14px; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .field .hint { font-size: 12px; color: var(--ok); margin-top: 5px; min-height: 18px; }

  /* ── Button groups ── */
  .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .btn-group .gbtn { flex: 1 0 calc(33% - 8px); min-width: 70px; padding: 10px 6px; font-size: 13px; font-weight: 600; border: 2px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text2); cursor: pointer; text-align: center; transition: all .12s; }
  .btn-group .gbtn.sel { border-color: var(--accent); background: rgba(79,142,247,.15); color: var(--accent); }
  .btn-group .gbtn.ok-sel { border-color: var(--ok); background: rgba(34,197,94,.15); color: var(--ok); }
  .btn-group .gbtn.ng-sel { border-color: var(--ng); background: rgba(239,68,68,.15); color: var(--ng); }
  .btn-group .gbtn.warn-sel { border-color: var(--warn); background: rgba(245,158,11,.15); color: var(--warn); }

  /* ── Qty buttons ── */
  .qty-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .qty-input { width: 90px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 20px; font-weight: 700; text-align: center; padding: 10px; outline: none; }
  .qty-input:focus { border-color: var(--accent); }
  .qty-btns { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
  .qbtn { padding: 9px 12px; font-size: 13px; font-weight: 700; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); cursor: pointer; }

  /* ── Submit ── */
  .submit-btn { width: 100%; padding: 15px; font-size: 16px; font-weight: 700; border: none; border-radius: var(--radius); background: var(--accent); color: #fff; cursor: pointer; letter-spacing: .5px; }
  .submit-btn:active { opacity: .85; }
  .submit-btn:disabled { background: var(--border); color: var(--text2); cursor: default; }

  /* ── After-submit options ── */
  #after-actions { display: none; gap: 10px; margin-top: 12px; }
  #after-actions.show { display: flex; }
  .after-btn { flex: 1; padding: 14px 6px; font-size: 14px; font-weight: 600; border: 2px solid var(--border); border-radius: var(--radius); background: var(--surface2); color: var(--text); cursor: pointer; text-align: center; }
  .after-btn.go { border-color: var(--accent); color: var(--accent); }

  /* ── Stock page ── */
  .stock-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .stock-controls input { flex: 1; min-width: 120px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 10px 12px; outline: none; }
  .stock-controls input:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 14px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); border-radius: 20px; background: var(--surface2); color: var(--text2); cursor: pointer; }
  .filter-btn.active { border-color: var(--accent); background: rgba(79,142,247,.15); color: var(--accent); }

  .stock-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .stock-card-header { display: flex; align-items: center; padding: 13px 14px; gap: 10px; cursor: pointer; }
  .stock-card-header .part-name { font-size: 15px; font-weight: 700; flex: 1; }
  .stock-card-header .part-qty { font-size: 20px; font-weight: 800; min-width: 50px; text-align: right; }
  .qty-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .badge-wip { background: rgba(124,92,252,.2); color: var(--accent2); }
  .badge-done { background: rgba(34,197,94,.2); color: var(--ok); }
  .badge-low { background: rgba(239,68,68,.2); color: var(--ng); }
  .stock-detail { display: none; border-top: 1px solid var(--border); padding: 10px 14px; background: var(--surface2); }
  .stock-detail.open { display: block; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--text2); }
  .detail-val { font-weight: 700; }

  /* ── Log page ── */
  .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 8px; }
  .log-card .log-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .log-card .log-body { font-size: 14px; font-weight: 600; }
  .log-card .log-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .del-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--ng); border-radius: 6px; background: none; color: var(--ng); cursor: pointer; }
  .edit-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--accent); border-radius: 6px; background: none; color: var(--accent); cursor: pointer; margin-right: 4px; }

  /* ── Login ── */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; padding: 24px; }
  #login-screen h2 { font-size: 22px; margin-bottom: 28px; }
  #login-screen input { width: 100%; max-width: 320px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; padding: 13px 16px; margin-bottom: 12px; outline: none; display: block; }
  #login-screen button { width: 100%; max-width: 320px; padding: 14px; font-size: 16px; font-weight: 700; border: none; border-radius: var(--radius); background: var(--accent); color: #fff; cursor: pointer; }
  #login-err { color: var(--ng); font-size: 13px; margin-top: 8px; min-height: 20px; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #222235; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; white-space: nowrap; z-index: 9999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.ok { border-color: var(--ok); color: var(--ok); }
  #toast.err { border-color: var(--ng); color: var(--ng); }

  /* ── Loading ── */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── QR ── */
  #qr-modal { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
  #qr-modal.open { display: flex; }
  #qr-modal video { width: 100%; max-width: 360px; border-radius: var(--radius); }
  #qr-modal .qr-close { margin-top: 16px; padding: 12px 28px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; cursor: pointer; }

  /* ── Edit modal ── */
  #edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 600; display: none; align-items: center; justify-content: center; padding: 20px; }
  #edit-modal.open { display: flex; }
  #edit-modal .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 360px; }
  #edit-modal h3 { font-size: 16px; margin-bottom: 14px; }
  #edit-modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 16px; padding: 11px 14px; outline: none; margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button { flex: 1; padding: 12px; font-size: 14px; font-weight: 700; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; }
  .modal-actions button.save { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── CSV button ── */
  .csv-btn { padding: 9px 16px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text2); cursor: pointer; }
  .csv-btn:hover { border-color: var(--accent); color: var(--accent); }

  .empty { text-align: center; color: var(--text2); padding: 40px 0; font-size: 14px; }
  .sort-btn { padding: 7px 12px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); border-radius: 20px; background: var(--surface2); color: var(--text2); cursor: pointer; }
  .sort-btn.active { border-color: var(--warn); color: var(--warn); }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <h2>🏭 在庫管理システム</h2>
  <input id="li-user" type="text" placeholder="ユーザー名" autocomplete="username">
  <input id="li-line" type="text" placeholder="ライン名（例: A-1）">
  <input id="li-pass" type="password" placeholder="パスワード" autocomplete="current-password">
  <button onclick="doLogin()">ログイン</button>
  <div id="login-err"></div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <div id="header">
    <h1>📦 在庫管理</h1>
    <div class="user-info">
      <div id="hdr-user">-</div>
      <div id="hdr-line" style="color:var(--accent);font-size:11px;"></div>
    </div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="showPage('input')">➕ 入力</button>
    <button class="nav-btn" onclick="showPage('stock')">📊 在庫</button>
    <button class="nav-btn" onclick="showPage('log')">📋 ログ</button>
  </div>
  <div id="main">

    <!-- INPUT PAGE -->
    <div id="page-input" class="page active">
      <div class="card">
        <div class="field">
          <label>品番</label>
          <div style="display:flex;gap:8px;">
            <input id="inp-partno" type="text" placeholder="品番を入力 or QR読取" oninput="onPartnoChange()" style="flex:1">
            <button onclick="openQR()" style="padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:18px;cursor:pointer;">⊡</button>
          </div>
          <div class="hint" id="part-hint">品番を入力してください</div>
        </div>
      </div>

      <div class="card">
        <div class="section-label">工程選択</div>
        <div class="btn-group" id="proc-btns">
          <button class="gbtn" onclick="selProc(this,'工程1')">工程1</button>
          <button class="gbtn" onclick="selProc(this,'工程2')">工程2</button>
          <button class="gbtn" onclick="selProc(this,'工程3')">工程3</button>
          <button class="gbtn" onclick="selProc(this,'工程4')">工程4</button>
          <button class="gbtn" onclick="selProc(this,'工程5')">工程5</button>
          <button class="gbtn" onclick="selProc(this,'工程6')">工程6</button>
          <button class="gbtn" onclick="selProc(this,'バリ取り未品')">バリ取り未品</button>
          <button class="gbtn" onclick="selProc(this,'完成品')">完成品</button>
          <button class="gbtn" onclick="selProc(this,'出荷')">出荷</button>
        </div>
      </div>

      <div class="card">
        <div class="section-label">区分</div>
        <div class="btn-group" id="kubun-btns">
          <button class="gbtn" onclick="selKubun(this,'良品','ok')">✅ 良品</button>
          <button class="gbtn" onclick="selKubun(this,'不良品','ng')">❌ 不良品</button>
          <button class="gbtn" onclick="selKubun(this,'段取り品','warn')">⚙️ 段取り品</button>
        </div>
      </div>

      <div class="card">
        <div class="section-label">数量</div>
        <div class="qty-row">
          <input id="inp-qty" class="qty-input" type="number" value="1" min="1">
          <div class="qty-btns">
            <button class="qbtn" onclick="addQty(1)">+1</button>
            <button class="qbtn" onclick="addQty(5)">+5</button>
            <button class="qbtn" onclick="addQty(10)">+10</button>
            <button class="qbtn" onclick="addQty(50)">+50</button>
            <button class="qbtn" onclick="addQty(100)">+100</button>
            <button class="qbtn" style="color:var(--ng)" onclick="document.getElementById('inp-qty').value=1">RST</button>
          </div>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitEntry()">送信</button>

      <div id="after-actions">
        <button class="after-btn" onclick="resetInputForm()">🔄 続けて入力</button>
        <button class="after-btn go" onclick="showPage('stock');loadStock()">📊 在庫へ →</button>
      </div>
    </div>

    <!-- STOCK PAGE -->
    <div id="page-stock" class="page">
      <div class="stock-controls">
        <input id="stock-search" type="text" placeholder="🔍 品名・品番で検索" oninput="renderStock()">
        <button class="csv-btn" onclick="downloadCSV()">CSV</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">全体</button>
        <button class="filter-btn" onclick="setFilter('done',this)">完成品</button>
        <button class="filter-btn" onclick="setFilter('mine',this)">自ライン</button>
        <button class="sort-btn" id="sort-asc" onclick="toggleSort()">少ない順↑</button>
      </div>
      <div id="stock-list"></div>
    </div>

    <!-- LOG PAGE -->
    <div id="page-log" class="page">
      <div class="stock-controls" style="margin-bottom:10px;">
        <input id="log-search" type="text" placeholder="🔍 品番・担当者で検索" oninput="renderLogs()">
        <button class="csv-btn" onclick="downloadCSV()">CSV</button>
      </div>
      <div id="log-list"></div>
    </div>

  </div>
</div>

<!-- QR Modal -->
<div id="qr-modal">
  <video id="qr-video" autoplay playsinline></video>
  <button class="qr-close" onclick="closeQR()">✕ 閉じる</button>
</div>

<!-- Edit Modal -->
<div id="edit-modal">
  <div class="modal-box">
    <h3>数量を修正</h3>
    <input id="edit-qty" type="number" min="1">
    <div class="modal-actions">
      <button onclick="closeEdit()">キャンセル</button>
      <button class="save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG — GAS WebアプリURLをここに貼る
// ═══════════════════════════════════════════════
const GAS_URL = 'YOUR_GAS_WEB_APP_URL';

// ═══════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════
let state = {
  user: '', line: '', role: '',
  proc: '', kubun: '',
  stockData: [], logData: [],
  filter: 'all', sortAsc: false,
  editId: null,
};

// ═══════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const saved = ls('inv_session');
  if (saved) {
    Object.assign(state, JSON.parse(saved));
    startApp();
  }
});

// ═══════════════════════════════════════════════
//  Login
// ═══════════════════════════════════════════════
async function doLogin() {
  const user = v('li-user').trim();
  const line = v('li-line').trim();
  const pass = v('li-pass');
  if (!user || !line || !pass) { set('login-err','全項目入力してください'); return; }

  try {
    const res = await gasPost({ action:'login', user, pass });
    if (!res.ok) { set('login-err', res.msg || 'ログイン失敗'); return; }
    state.user = user;
    state.line = line;
    state.role = res.role;
    lsSave('inv_session', JSON.stringify({ user, line, role: res.role }));
    set('login-err','');
    startApp();
  } catch(e) {
    set('login-err','接続エラー: ' + e.message);
  }
}

function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  set('hdr-user', `${state.user} [${state.role}]`);
  set('hdr-line', state.line);
}

// ═══════════════════════════════════════════════
//  Navigation
// ═══════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const idx = { input:0, stock:1, log:2 }[name];
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (name === 'stock') loadStock();
  if (name === 'log') loadLogs();
}

// ═══════════════════════════════════════════════
//  Part lookup
// ═══════════════════════════════════════════════
let partnoTimer;
function onPartnoChange() {
  clearTimeout(partnoTimer);
  const no = v('inp-partno').trim();
  if (!no) { set('part-hint','品番を入力してください'); return; }
  set('part-hint','検索中...');
  partnoTimer = setTimeout(() => lookupPart(no), 400);
}

async function lookupPart(no) {
  try {
    const res = await gasGet({ action:'master', partno: no });
    if (res.ok && res.name) {
      set('part-hint', `✅ ${res.name}`);
    } else {
      set('part-hint', '⚠️ 品番が見つかりません');
    }
  } catch(e) {
    set('part-hint', '接続エラー');
  }
}

// ═══════════════════════════════════════════════
//  Process / Kubun select
// ═══════════════════════════════════════════════
function selProc(el, val) {
  state.proc = val;
  document.querySelectorAll('#proc-btns .gbtn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
}

function selKubun(el, val, cls) {
  state.kubun = val;
  document.querySelectorAll('#kubun-btns .gbtn').forEach(b => {
    b.classList.remove('sel','ok-sel','ng-sel','warn-sel');
  });
  el.classList.add(cls + '-sel');
}

// ═══════════════════════════════════════════════
//  Quantity
// ═══════════════════════════════════════════════
function addQty(n) {
  const el = document.getElementById('inp-qty');
  el.value = Math.max(1, (parseInt(el.value) || 0) + n);
}

// ═══════════════════════════════════════════════
//  Submit
// ═══════════════════════════════════════════════
async function submitEntry() {
  const partno = v('inp-partno').trim();
  const qty = parseInt(document.getElementById('inp-qty').value) || 0;

  if (!partno) { toast('品番を入力してください','err'); return; }
  if (!state.proc) { toast('工程を選択してください','err'); return; }
  if (!state.kubun) { toast('区分を選択してください','err'); return; }
  if (qty < 1) { toast('数量を入力してください','err'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>送信中...';

  try {
    const res = await gasPost({
      action: 'log',
      user: state.user,
      line: state.line,
      partno,
      proc: state.proc,
      kubun: state.kubun,
      qty,
    });
    if (res.ok) {
      toast('✅ 送信しました','ok');
      document.getElementById('after-actions').classList.add('show');
    } else {
      toast('送信失敗: ' + (res.msg || ''), 'err');
    }
  } catch(e) {
    toast('接続エラー: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '送信';
  }
}

function resetInputForm() {
  document.getElementById('inp-partno').value = '';
  document.getElementById('inp-qty').value = 1;
  set('part-hint','品番を入力してください');
  state.proc = ''; state.kubun = '';
  document.querySelectorAll('#proc-btns .gbtn, #kubun-btns .gbtn').forEach(b => {
    b.classList.remove('sel','ok-sel','ng-sel','warn-sel');
  });
  document.getElementById('after-actions').classList.remove('show');
}

// ═══════════════════════════════════════════════
//  Stock
// ═══════════════════════════════════════════════
async function loadStock() {
  document.getElementById('stock-list').innerHTML = '<div class="empty"><span class="spinner"></span>読込中...</div>';
  try {
    const res = await gasGet({ action: 'stock' });
    state.stockData = res.data || [];
    renderStock();
  } catch(e) {
    document.getElementById('stock-list').innerHTML = `<div class="empty">接続エラー</div>`;
  }
}

function setFilter(f, el) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderStock();
}

function toggleSort() {
  state.sortAsc = !state.sortAsc;
  const btn = document.getElementById('sort-asc');
  btn.classList.toggle('active', state.sortAsc);
  renderStock();
}

function renderStock() {
  const q = v('stock-search').toLowerCase();
  let data = state.stockData.filter(s => {
    if (q && !s.name.toLowerCase().includes(q) && !s.partno.toLowerCase().includes(q)) return false;
    if (state.filter === 'done' && s.category !== '完成品') return false;
    if (state.filter === 'mine' && s.line !== state.line) return false;
    return true;
  });

  if (state.sortAsc) data = data.sort((a,b) => a.total - b.total);

  const el = document.getElementById('stock-list');
  if (!data.length) { el.innerHTML = '<div class="empty">データなし</div>'; return; }

  el.innerHTML = data.map(s => {
    const catBadge = s.category === '完成品'
      ? `<span class="qty-badge badge-done">完成品</span>`
      : s.category === 'バリ前'
      ? `<span class="qty-badge badge-wip" style="color:#f59e0b">バリ前</span>`
      : `<span class="qty-badge badge-wip">仕掛</span>`;
    const lowBadge = s.total < 5 ? `<span class="qty-badge badge-low" style="margin-left:4px">少</span>` : '';
    const color = s.total < 0 ? 'var(--ng)' : s.total < 5 ? 'var(--warn)' : 'var(--ok)';
    const details = s.details.map(d => `
      <div class="detail-row">
        <span class="detail-label">${d.proc} / ${d.kubun}</span>
        <span class="detail-val" style="color:${d.qty>=0?'var(--ok)':'var(--ng)'}">
          ${d.qty >= 0 ? '+' : ''}${d.qty}
        </span>
      </div>`).join('');

    return `<div class="stock-card">
      <div class="stock-card-header" onclick="toggleDetail(this)">
        <div>
          <div class="part-name">${esc(s.name)}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">${esc(s.partno)} ${catBadge}${lowBadge}</div>
        </div>
        <div class="part-qty" style="color:${color}">${s.total}</div>
      </div>
      <div class="stock-detail">${details || '<div style="color:var(--text2);font-size:13px;">詳細なし</div>'}</div>
    </div>`;
  }).join('');
}

function toggleDetail(header) {
  const detail = header.nextElementSibling;
  detail.classList.toggle('open');
}

// ═══════════════════════════════════════════════
//  Logs
// ═══════════════════════════════════════════════
async function loadLogs() {
  document.getElementById('log-list').innerHTML = '<div class="empty"><span class="spinner"></span>読込中...</div>';
  try {
    const res = await gasGet({ action: 'logs' });
    state.logData = res.data || [];
    renderLogs();
  } catch(e) {
    document.getElementById('log-list').innerHTML = `<div class="empty">接続エラー</div>`;
  }
}

function renderLogs() {
  const q = v('log-search').toLowerCase();
  let data = state.logData.filter(l => {
    if (q && !l.partno.toLowerCase().includes(q) && !l.user.toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('log-list');
  if (!data.length) { el.innerHTML = '<div class="empty">ログなし</div>'; return; }

  el.innerHTML = data.slice(0, 200).map(l => {
    const canEdit = state.role === 'admin' || l.user === state.user;
    const sign = l.kubun === '良品' ? '+' : '-';
    const col = l.kubun === '良品' ? 'var(--ok)' : 'var(--ng)';
    const delStyle = l.deleted ? 'opacity:.4;' : '';
    const editBtns = canEdit && !l.deleted ? `
      <button class="edit-btn" onclick="openEdit('${l.id}',${l.qty})">編集</button>
      <button class="del-btn" onclick="deleteLog('${l.id}')">削除</button>` : '';
    return `<div class="log-card" style="${delStyle}">
      <div class="log-top">
        <span>${l.datetime}</span>
        <div>${editBtns}</div>
      </div>
      <div class="log-body">
        ${esc(l.partno)} / ${esc(l.name)}
        <span style="color:${col};margin-left:8px;">${sign}${l.qty}</span>
        ${l.deleted ? '<span style="color:var(--ng);font-size:11px;"> [削除済]</span>' : ''}
      </div>
      <div class="log-sub">${esc(l.proc)} | ${esc(l.kubun)} | ${esc(l.user)} | ${esc(l.line)}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  Edit / Delete
// ═══════════════════════════════════════════════
function openEdit(id, qty) {
  state.editId = id;
  document.getElementById('edit-qty').value = qty;
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit() {
  document.getElementById('edit-modal').classList.remove('open');
  state.editId = null;
}
async function saveEdit() {
  const qty = parseInt(document.getElementById('edit-qty').value);
  if (!qty || qty < 1) { toast('正しい数量を入力してください','err'); return; }
  try {
    const res = await gasPost({ action:'edit', id: state.editId, qty, user: state.user });
    if (res.ok) { toast('更新しました','ok'); closeEdit(); loadLogs(); }
    else toast(res.msg || 'エラー','err');
  } catch(e) { toast('接続エラー','err'); }
}

async function deleteLog(id) {
  if (!confirm('このログを削除しますか？')) return;
  try {
    const res = await gasPost({ action:'delete', id, user: state.user });
    if (res.ok) { toast('削除しました','ok'); loadLogs(); }
    else toast(res.msg || 'エラー','err');
  } catch(e) { toast('接続エラー','err'); }
}

// ═══════════════════════════════════════════════
//  QR Scanner (jsQR)
// ═══════════════════════════════════════════════
let qrStream = null, qrAnimId = null;

async function openQR() {
  document.getElementById('qr-modal').classList.add('open');
  const video = document.getElementById('qr-video');
  try {
    qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = qrStream;
    await video.play();
    scanFrame(video);
  } catch(e) {
    toast('カメラにアクセスできません','err');
    closeQR();
  }
}

function scanFrame(video) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      // jsQR がロードされている場合のみ処理
      if (typeof jsQR !== 'undefined') {
        const code = jsQR(imgData.data, imgData.width, imgData.height);
        if (code) {
          document.getElementById('inp-partno').value = code.data;
          onPartnoChange();
          closeQR();
          return;
        }
      }
    }
    qrAnimId = requestAnimationFrame(tick);
  }
  qrAnimId = requestAnimationFrame(tick);
}

function closeQR() {
  cancelAnimationFrame(qrAnimId);
  if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
  document.getElementById('qr-video').srcObject = null;
  document.getElementById('qr-modal').classList.remove('open');
}

// ═══════════════════════════════════════════════
//  API helpers
// ═══════════════════════════════════════════════
async function gasGet(params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(GAS_URL + '?' + qs, { redirect: 'follow' });
  return res.json();
}

async function gasPost(body) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    redirect: 'follow',
  });
  return res.json();
}

// ═══════════════════════════════════════════════
//  Utils
// ═══════════════════════════════════════════════
function v(id) { return document.getElementById(id)?.value || ''; }
function set(id, html) { const el=document.getElementById(id); if(el) el.innerHTML=html; }
function ls(k) { try { return localStorage.getItem(k); } catch{ return null; } }
function lsSave(k, v) { try { localStorage.setItem(k, v); } catch{} }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2500);
}
